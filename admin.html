<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR 시그널 관리자</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #F5F0E8; --cream-dark: #EDE7D9; --cream-border: #D8D0C0;
  --ink: #2A2218; --ink-mid: #5A5040; --ink-light: #8A7F6A;
  --red: #C94A2A; --green: #3A7A5A; --blue: #2A5A8A;
  --slot-empty: #F9F7F3; --slot-filled: #F0F7F3;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--cream); color:var(--ink); font-family:'Noto Sans KR',sans-serif; font-size:13px; min-height:100vh; }

.admin-header { background:var(--ink); color:var(--cream); padding:14px 24px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
.admin-logo { font-family:'Noto Serif KR',serif; font-size:17px; font-weight:700; }
.admin-logo span { color:#E07A3A; }
.header-actions { display:flex; gap:8px; }
.btn { padding:7px 14px; border-radius:4px; cursor:pointer; font-size:12px; font-family:'Noto Sans KR',sans-serif; border:none; transition:opacity .15s; }
.btn:hover { opacity:.85; }
.btn-outline { background:transparent; border:1px solid rgba(255,255,255,0.3); color:var(--cream); }
.btn-blue    { background:var(--blue); color:white; }
.btn-save    { background:var(--red); color:white; font-weight:600; box-shadow:0 2px 8px rgba(201,74,42,0.35); }

.admin-layout { display:flex; min-height:calc(100vh - 52px); }

/* 사이드바 */
.sidebar { width:260px; border-right:1px solid var(--cream-border); padding:16px 0; background:var(--cream); flex-shrink:0; overflow-y:auto; }
.sidebar-label { font-size:10px; letter-spacing:2px; color:var(--ink-light); padding:0 16px 10px; }
.edition-item { padding:12px 10px 12px 16px; cursor:pointer; border-left:3px solid transparent; transition:all .15s; display:flex; align-items:flex-start; justify-content:space-between; gap:6px; border-bottom:1px solid var(--cream-border); }
.edition-item:hover { background:var(--cream-dark); }
.edition-item.active { border-left-color:var(--red); background:var(--cream-dark); }

/* ★ 에디션 드롭 타깃 스타일 */
.edition-item.drop-target { background:#EEF4FF; border-left-color:var(--blue); outline:2px dashed var(--blue); outline-offset:-2px; }
.edition-item.drop-target .edition-item-title { color:var(--blue); font-weight:700; }
/* 드래그 중 사이드바 힌트 배너 */
.sidebar-drag-hint { display:none; font-size:10px; color:var(--blue); background:#EEF4FF; border:1px dashed var(--blue); border-radius:4px; margin:8px 12px; padding:6px 10px; text-align:center; }
.sidebar-drag-hint.show { display:block; }

.edition-item-info { flex:1; min-width:0; }
.edition-item-title { font-size:12px; font-weight:500; color:var(--ink); display:flex; align-items:center; gap:5px; flex-wrap:wrap; margin-bottom:4px; }
.edition-item-date  { font-size:10px; color:var(--ink-light); line-height:1.6; }
.current-badge { font-size:9px; background:var(--green); color:white; padding:1px 6px; border-radius:8px; white-space:nowrap; flex-shrink:0; }
.edition-actions { display:flex; gap:2px; align-items:center; flex-shrink:0; padding-top:2px; }
.edition-del-btn { background:none; border:none; cursor:pointer; color:var(--ink-light); font-size:13px; padding:3px 5px; border-radius:3px; transition:all .12s; }
.edition-del-btn:hover { color:var(--red); background:#FDEEE9; }
.edition-star-btn { background:none; border:none; cursor:pointer; color:var(--ink-light); font-size:13px; padding:3px 5px; border-radius:3px; transition:all .12s; }
.edition-star-btn:hover { color:#E07A3A; background:#FDF3E9; }
.add-edition-btn { margin:12px 16px 0; width:calc(100% - 32px); padding:9px; border:1px dashed var(--cream-border); border-radius:4px; background:none; cursor:pointer; font-size:11px; color:var(--ink-light); font-family:'Noto Sans KR',sans-serif; text-align:center; transition:all .15s; }
.add-edition-btn:hover { border-color:var(--ink-mid); color:var(--ink); }
.add-edition-btn.upload { border-color:var(--red); color:var(--red); margin-top:6px; }

/* 메인 */
.admin-main { flex:1; display:flex; flex-direction:column; overflow:hidden; }

/* 기본정보 바 */
.info-bar { background:white; border-bottom:1px solid var(--cream-border); padding:14px 24px; display:flex; gap:12px; align-items:flex-end; flex-wrap:wrap; flex-shrink:0; }
.info-bar .fg { display:flex; flex-direction:column; gap:3px; }
.info-bar label { font-size:10px; color:var(--ink-light); letter-spacing:.5px; }
.info-bar input { padding:6px 9px; border:1px solid var(--cream-border); border-radius:4px; font-size:12px; font-family:'Noto Sans KR',sans-serif; background:white; color:var(--ink); outline:none; }
.info-bar input:focus { border-color:var(--ink-mid); }
.info-bar .fg-title { flex:2; min-width:160px; }
.info-bar .fg-date  { width:140px; }
.info-bar .fg-period { width:140px; }
.info-bar textarea  { padding:6px 9px; border:1px solid var(--cream-border); border-radius:4px; font-size:12px; font-family:'Noto Sans KR',sans-serif; background:white; color:var(--ink); outline:none; resize:none; height:52px; }
.info-bar .fg-intro { flex:3; min-width:200px; }

/* 에디터 본문 */
.editor-body { flex:1; display:grid; grid-template-columns:1fr 320px; gap:0; overflow:hidden; }

/* 기사 풀 */
.pool-panel { display:flex; flex-direction:column; overflow:hidden; border-right:1px solid var(--cream-border); }
.pool-toolbar { padding:10px 16px; background:var(--cream); border-bottom:1px solid var(--cream-border); display:flex; align-items:center; gap:8px; flex-shrink:0; }
.pool-toolbar-title { font-size:12px; font-weight:600; color:var(--ink); flex:1; }
.pool-cat-filter { padding:4px 8px; border:1px solid var(--cream-border); border-radius:4px; font-size:11px; font-family:'Noto Sans KR',sans-serif; background:white; color:var(--ink); outline:none; }
.btn-add-art { padding:5px 12px; background:var(--green); color:white; border:none; border-radius:4px; font-size:11px; font-family:'Noto Sans KR',sans-serif; cursor:pointer; white-space:nowrap; }
.btn-add-art:hover { opacity:.85; }
.pool-scroll { flex:1; overflow-y:auto; padding:12px; }

/* 기사 카드 */
.art-card { background:white; border:1px solid var(--cream-border); border-radius:5px; margin-bottom:8px; cursor:grab; transition:all .12s; user-select:none; }
.art-card:hover { border-color:#B0A890; box-shadow:0 2px 6px rgba(0,0,0,0.06); }
.art-card.dragging { opacity:.4; cursor:grabbing; }
.art-card.assigned-top5 { border-left:3px solid var(--red); }
.art-card.assigned-ep   { border-left:3px solid #8B5CF6; }
.art-card-header { padding:8px 10px; display:flex; align-items:center; gap:8px; }
.art-card-cat { font-size:10px; color:white; padding:1px 7px; border-radius:10px; background:var(--ink-light); white-space:nowrap; flex-shrink:0; }
.art-card-title { flex:1; font-size:12px; font-weight:500; color:var(--ink); line-height:1.4; word-break:keep-all; }
.art-card-date { font-size:10px; color:var(--ink-light); white-space:nowrap; flex-shrink:0; }
.art-card-actions { display:flex; gap:4px; flex-shrink:0; }
.btn-xs { padding:3px 7px; font-size:10px; border-radius:3px; cursor:pointer; border:1px solid var(--cream-border); background:white; color:var(--ink-mid); font-family:'Noto Sans KR',sans-serif; transition:background .12s; white-space:nowrap; }
.btn-xs:hover { background:var(--cream-dark); }
.btn-xs.del { border-color:#FACCCC; color:var(--red); }
.btn-xs.del:hover { background:#FEF0F0; }
.art-card-body { padding:10px 10px 12px; border-top:1px solid var(--cream-border); display:none; }
.art-card-body.open { display:block; }
.art-form-row { display:flex; gap:8px; margin-bottom:8px; }
.art-fg { flex:1; display:flex; flex-direction:column; gap:3px; }
.art-fg label { font-size:10px; color:var(--ink-light); }
.art-fg input, .art-fg select, .art-fg textarea { padding:5px 8px; border:1px solid var(--cream-border); border-radius:3px; font-size:12px; font-family:'Noto Sans KR',sans-serif; background:white; color:var(--ink); outline:none; width:100%; }
.art-fg input:focus, .art-fg select:focus, .art-fg textarea:focus { border-color:var(--ink-mid); }
.art-fg textarea { resize:vertical; min-height:56px; }
.tags-wrap { display:flex; flex-wrap:wrap; gap:4px; padding:5px 7px; border:1px solid var(--cream-border); border-radius:3px; background:white; cursor:text; min-height:32px; align-items:center; }
.tag-chip { background:var(--cream-dark); border:1px solid var(--cream-border); border-radius:10px; padding:1px 7px; font-size:10px; color:var(--ink-mid); display:flex; align-items:center; gap:3px; }
.tag-chip button { background:none; border:none; cursor:pointer; color:var(--ink-light); font-size:10px; padding:0; line-height:1; }
.tags-input-field { border:none!important; outline:none; font-size:11px; font-family:'Noto Sans KR',sans-serif; min-width:60px; flex:1; padding:0!important; background:transparent; }
.point-row { display:flex; gap:6px; margin-bottom:5px; align-items:center; }
.point-row input { flex:1; }
.btn-add-row { padding:5px 10px; border:1px dashed var(--cream-border); border-radius:3px; background:none; cursor:pointer; font-size:10px; color:var(--ink-light); font-family:'Noto Sans KR',sans-serif; margin-top:2px; }
.btn-add-row:hover { border-color:var(--ink-mid); color:var(--ink); }
.art-save-row { display:flex; justify-content:flex-end; gap:6px; margin-top:8px; padding-top:8px; border-top:1px solid var(--cream-border); }
.btn-art-save { padding:5px 12px; background:var(--green); color:white; border:none; border-radius:3px; font-size:11px; font-family:'Noto Sans KR',sans-serif; cursor:pointer; }
.btn-art-save:hover { opacity:.85; }

/* 섹션 그룹 헤더 */
.cat-group { margin-bottom:4px; }
.cat-group-header { font-size:10px; letter-spacing:1.5px; color:var(--ink-light); padding:6px 4px 4px; border-bottom:1px solid var(--cream-border); margin-bottom:6px; display:flex; align-items:center; justify-content:space-between; }
.cat-group-count { font-size:10px; color:var(--ink-light); background:var(--cream-dark); padding:1px 6px; border-radius:8px; }

/* 오른쪽 패널 */
.assign-panel { display:flex; flex-direction:column; overflow-y:auto; background:var(--cream); }
.assign-section { padding:14px 16px; border-bottom:1px solid var(--cream-border); }
.assign-section-title { font-size:11px; font-weight:700; letter-spacing:1px; color:var(--ink-mid); margin-bottom:10px; display:flex; align-items:center; gap:6px; }
.assign-section-title span { font-size:10px; font-weight:400; color:var(--ink-light); letter-spacing:0; }

/* 슬롯 */
.slot { border:2px dashed var(--cream-border); border-radius:5px; padding:8px 10px; margin-bottom:6px; min-height:44px; background:var(--slot-empty); transition:all .15s; position:relative; }
.slot.drag-over { border-color:var(--blue); background:#EEF4FF; }
.slot.filled { border-style:solid; border-color:#C8D8C0; background:var(--slot-filled); }
.slot-num { font-size:10px; color:var(--ink-light); margin-bottom:4px; font-weight:600; }
.slot-empty-hint { font-size:11px; color:var(--ink-light); font-style:italic; }
.slot-content { display:flex; align-items:flex-start; gap:8px; }
.slot-title { flex:1; font-size:12px; font-weight:500; color:var(--ink); line-height:1.4; word-break:keep-all; }
.slot-meta  { font-size:10px; color:var(--ink-light); margin-top:2px; }
.slot-remove { background:none; border:none; cursor:pointer; color:var(--ink-light); font-size:12px; padding:0 2px; line-height:1; flex-shrink:0; transition:color .12s; }
.slot-remove:hover { color:var(--red); }
.slot-badge-row { display:flex; gap:6px; margin-top:6px; align-items:center; }
.slot-badge-input { padding:3px 6px; border:1px solid var(--cream-border); border-radius:3px; font-size:10px; font-family:'Noto Sans KR',sans-serif; background:white; width:80px; outline:none; }
.slot-badge-select { padding:3px 5px; border:1px solid var(--cream-border); border-radius:3px; font-size:10px; font-family:'Noto Sans KR',sans-serif; background:white; outline:none; }
.slot-drag-handle { color:var(--cream-border); font-size:14px; cursor:grab; user-select:none; padding:0 6px 0 0; flex-shrink:0; transition:color .12s; }
.slot-drag-handle:hover { color:var(--ink-mid); }
.slot.slot-dragging { opacity:.4; }
.slot.slot-drag-over { border-color:var(--blue); background:#EEF4FF; }
.art-card.editing { cursor:default; }
.art-card.editing .art-card-header { cursor:default; }

/* EP 슬롯 */
.ep-slot { border:2px dashed #C4B5FD; background:#FAF8FF; }
.ep-slot.drag-over { border-color:#8B5CF6; background:#F3EEFF; }
.ep-slot.filled { border-style:solid; border-color:#A78BFA; background:#F3EEFF; }

/* 빈 상태 */
.empty-state { text-align:center; padding:60px 0; color:var(--ink-light); }
.empty-state h3 { font-size:15px; margin-bottom:8px; color:var(--ink-mid); }

/* 토스트 */
.toast { position:fixed; bottom:24px; right:24px; background:var(--ink); color:var(--cream); padding:11px 18px; border-radius:6px; font-size:12px; transform:translateY(80px); opacity:0; transition:all .3s; z-index:999; }
.toast.show { transform:translateY(0); opacity:1; }

/* JSON 뷰어 */
.json-viewer-modal { display:none; position:fixed; inset:0; background:rgba(42,34,24,0.6); z-index:400; align-items:center; justify-content:center; padding:20px; }
.json-viewer-modal.show { display:flex; }
.json-viewer-box { background:#1E1E2E; border-radius:8px; width:100%; max-width:760px; max-height:90vh; display:flex; flex-direction:column; box-shadow:0 20px 60px rgba(0,0,0,0.4); overflow:hidden; }
.json-viewer-header { background:#2A2A3E; padding:12px 16px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid #3A3A50; flex-shrink:0; }
.json-viewer-title { font-size:12px; font-weight:500; color:#C9C9E0; }
.json-viewer-actions { display:flex; gap:6px; align-items:center; }
.json-viewer-btn { padding:5px 12px; border-radius:4px; cursor:pointer; font-size:11px; font-family:'Noto Sans KR',sans-serif; border:none; transition:opacity .15s; }
.json-viewer-btn:hover { opacity:.85; }
.jvb-scope { background:#3A3A50; color:#C9C9E0; }
.jvb-scope.active { background:#5A5A7A; color:white; }
.jvb-copy { background:#3A7A5A; color:white; }
.jvb-download { background:#2A5A8A; color:white; }
.jvb-close { background:none; border:1px solid #4A4A60!important; color:#8A8AAA; width:26px; height:26px; display:flex; align-items:center; justify-content:center; border-radius:50%; padding:0; font-size:13px; }
.json-viewer-tabs { display:flex; background:#252535; border-bottom:1px solid #3A3A50; flex-shrink:0; }
.json-tab-btn { padding:7px 14px; font-size:11px; color:#7A7A9A; background:none; border:none; cursor:pointer; border-bottom:2px solid transparent; font-family:'Noto Sans KR',sans-serif; transition:all .15s; }
.json-tab-btn:hover { color:#C9C9E0; }
.json-tab-btn.active { color:#E07A3A; border-bottom-color:#E07A3A; }
.json-viewer-body { flex:1; overflow:auto; }
.json-code { padding:18px; font-family:'Consolas','Monaco',monospace; font-size:12px; line-height:1.7; color:#CDD6F4; white-space:pre; background:#1E1E2E; }
.json-key { color:#89DCEB; } .json-str { color:#A6E3A1; } .json-num { color:#FAB387; } .json-bool { color:#CBA6F7; } .json-null { color:#7F849C; }
.json-editor { width:100%; height:100%; min-height:400px; padding:18px; font-family:'Consolas','Monaco',monospace; font-size:12px; line-height:1.7; color:#CDD6F4; background:#1E1E2E; border:none; outline:none; resize:none; }
.json-editor-toolbar { background:#252535; padding:9px 16px; display:flex; align-items:center; gap:8px; border-top:1px solid #3A3A50; flex-shrink:0; }
.json-editor-status { font-size:11px; color:#7A7A9A; flex:1; }
.json-editor-status.error { color:#F38BA8; }
.json-editor-status.ok { color:#A6E3A1; }

/* 조회수 분석 */
.views-modal { display:none; position:fixed; inset:0; background:rgba(42,34,24,0.6); z-index:400; align-items:center; justify-content:center; padding:20px; }
.views-modal.show { display:flex; }
.views-box { background:var(--cream); border-radius:10px; width:100%; max-width:860px; max-height:92vh; display:flex; flex-direction:column; box-shadow:0 20px 60px rgba(0,0,0,0.3); overflow:hidden; border:1px solid var(--cream-border); }
.views-header { background:var(--ink); padding:14px 20px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.views-header-title { font-family:'Noto Serif KR',serif; font-size:15px; color:var(--cream); }
.views-header-title span { color:#E07A3A; }
.views-close-btn { background:none; border:1px solid rgba(255,255,255,0.25); border-radius:50%; width:26px; height:26px; color:var(--cream); cursor:pointer; font-size:13px; display:flex; align-items:center; justify-content:center; }
.views-body { flex:1; overflow-y:auto; padding:20px; }
.views-scope-bar { display:flex; gap:8px; margin-bottom:18px; align-items:center; flex-wrap:wrap; }
.views-scope-label { font-size:11px; color:var(--ink-light); margin-right:4px; }
.views-scope-btn { padding:5px 13px; border-radius:20px; border:1px solid var(--cream-border); background:white; font-size:11px; font-family:'Noto Sans KR',sans-serif; cursor:pointer; color:var(--ink-mid); transition:all .15s; }
.views-scope-btn:hover { border-color:var(--ink-mid); }
.views-scope-btn.active { background:var(--ink); color:var(--cream); border-color:var(--ink); }
.views-kpi-row { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:20px; }
.views-kpi { background:white; border:1px solid var(--cream-border); border-radius:7px; padding:13px 15px; }
.views-kpi-label { font-size:10px; color:var(--ink-light); letter-spacing:.5px; margin-bottom:5px; }
.views-kpi-val { font-size:22px; font-weight:700; color:var(--ink); font-family:'Noto Serif KR',serif; }
.views-kpi-sub { font-size:10px; color:var(--ink-light); margin-top:3px; }
.views-kpi.highlight { border-color:#E07A3A; }
.views-kpi.highlight .views-kpi-val { color:#C94A2A; }
.views-section-title { font-size:11px; font-weight:700; letter-spacing:1px; color:var(--ink-mid); margin-bottom:12px; padding-bottom:6px; border-bottom:1px solid var(--cream-border); }
.views-chart-wrap { background:white; border:1px solid var(--cream-border); border-radius:7px; padding:16px; margin-bottom:16px; }
.bar-row { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
.bar-label { font-size:11px; color:var(--ink); width:130px; flex-shrink:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.bar-track { flex:1; background:var(--cream-dark); border-radius:20px; height:14px; overflow:hidden; }
.bar-fill { height:100%; border-radius:20px; background:var(--blue); transition:width .4s ease; }
.bar-fill.top1 { background:#C94A2A; }
.bar-fill.top2 { background:#E07A3A; }
.bar-fill.top3 { background:#5A7A2A; }
.bar-val { font-size:11px; color:var(--ink-mid); width:38px; text-align:right; flex-shrink:0; }
.views-table { width:100%; border-collapse:collapse; font-size:12px; }
.views-table th { padding:7px 10px; text-align:left; font-size:10px; letter-spacing:.5px; color:var(--ink-light); border-bottom:2px solid var(--cream-border); background:var(--cream); font-weight:600; }
.views-table td { padding:8px 10px; border-bottom:1px solid var(--cream-border); vertical-align:middle; }
.views-table tr:last-child td { border-bottom:none; }
.views-table tr:hover td { background:var(--cream-dark); }
.views-rank-badge { display:inline-block; width:20px; height:20px; border-radius:50%; background:var(--cream-dark); text-align:center; line-height:20px; font-size:10px; font-weight:700; color:var(--ink-mid); }
.views-rank-badge.r1 { background:#C94A2A; color:white; }
.views-rank-badge.r2 { background:#E07A3A; color:white; }
.views-rank-badge.r3 { background:#5A7A2A; color:white; }
.views-progress-mini { height:6px; background:var(--cream-dark); border-radius:10px; overflow:hidden; margin-top:3px; }
.views-progress-fill { height:100%; background:var(--blue); border-radius:10px; }
.views-empty { text-align:center; padding:48px; color:var(--ink-light); font-size:13px; }
.views-empty-icon { font-size:36px; margin-bottom:10px; }
.views-loading { text-align:center; padding:48px; color:var(--ink-light); font-size:12px; }
.views-tab-row { display:flex; gap:0; border-bottom:1px solid var(--cream-border); margin-bottom:18px; }
.views-tab { padding:8px 18px; font-size:12px; font-family:'Noto Sans KR',sans-serif; border:none; background:none; cursor:pointer; color:var(--ink-light); border-bottom:2px solid transparent; margin-bottom:-1px; transition:all .15s; }
.views-tab.active { color:var(--red); border-bottom-color:var(--red); font-weight:600; }
.views-refresh-btn { margin-left:auto; padding:5px 12px; background:none; border:1px solid var(--cream-border); border-radius:4px; font-size:11px; font-family:'Noto Sans KR',sans-serif; cursor:pointer; color:var(--ink-mid); }
.views-refresh-btn:hover { background:var(--cream-dark); }
</style>
</head>
<body>

<header class="admin-header">
  <div class="admin-logo">HR<span>시그널</span> 관리자</div>
  <div class="header-actions">
    <a href="index.html" class="btn btn-outline">← 뉴스레터 보기</a>
    <button class="btn btn-outline" onclick="openViewsAnalytics()">📊 조회수 분석</button>
    <button class="btn btn-blue" onclick="openJsonViewer()">{ } JSON 보기/편집</button>
    <button class="btn btn-save" onclick="saveAll()">💾 저장 & 발행</button>
  </div>
</header>

<div class="admin-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-label">에디션 목록</div>
    <!-- ★ 드래그 중 힌트 배너 -->
    <div class="sidebar-drag-hint" id="sidebar-drag-hint">📂 에디션으로 드래그해서 기사 이동</div>
    <div id="edition-list"></div>
    <button class="add-edition-btn" onclick="createNewEdition()">+ 새 에디션 추가</button>
    <button class="add-edition-btn upload" onclick="showJsonUpload()">↑ JSON으로 업로드</button>
  </aside>

  <main class="admin-main" id="admin-main">
    <div class="empty-state" style="margin:auto;">
      <h3>에디션을 선택하거나 새로 만드세요</h3>
      <p>왼쪽 사이드바에서 에디션을 선택하면 편집할 수 있습니다.</p>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<!-- 조회수 분석 모달 -->
<div class="views-modal" id="views-modal">
  <div class="views-box">
    <div class="views-header">
      <div class="views-header-title">HR<span>시그널</span> 조회수 분석</div>
      <button class="views-close-btn" onclick="closeViewsAnalytics()">✕</button>
    </div>
    <div class="views-body" id="views-body">
      <div class="views-loading">데이터를 불러오는 중...</div>
    </div>
  </div>
</div>

<!-- JSON 업로드 모달 -->
<div style="display:none;position:fixed;inset:0;background:rgba(42,34,24,0.55);z-index:300;align-items:center;justify-content:center;" id="json-modal">
  <div style="background:#F5F0E8;border-radius:8px;padding:26px;width:540px;max-width:95vw;border:1px solid #D8D0C0;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
      <div>
        <div style="font-family:'Noto Serif KR',serif;font-size:15px;font-weight:700;color:#2A2218;">JSON으로 에디션 추가</div>
        <div style="font-size:11px;color:#8A7F6A;margin-top:2px;">기존 에디션은 유지되고 새 에디션만 추가됩니다.</div>
      </div>
      <button onclick="closeJsonUpload()" style="background:none;border:1px solid #D8D0C0;border-radius:50%;width:26px;height:26px;cursor:pointer;font-size:13px;color:#5A5040;">✕</button>
    </div>
    <textarea id="json-input" placeholder="JSON을 붙여넣으세요." style="width:100%;height:200px;padding:10px;border:1px solid #D8D0C0;border-radius:4px;font-size:12px;font-family:monospace;background:white;color:#2A2218;resize:vertical;outline:none;"></textarea>
    <div id="json-error" style="font-size:11px;color:#C94A2A;margin-top:5px;display:none;"></div>
    <div style="display:flex;gap:8px;margin-top:10px;">
      <button onclick="closeJsonUpload()" style="padding:9px 14px;border:1px solid #D8D0C0;border-radius:4px;background:none;cursor:pointer;font-size:12px;color:#5A5040;font-family:'Noto Sans KR',sans-serif;">취소</button>
      <button onclick="uploadJson()" style="flex:1;padding:9px;background:#2A2218;color:#F5F0E8;border:none;border-radius:4px;cursor:pointer;font-size:12px;font-family:'Noto Sans KR',sans-serif;">업로드</button>
    </div>
  </div>
</div>

<!-- JSON 뷰어/편집 모달 -->
<div class="json-viewer-modal" id="json-viewer-modal">
  <div class="json-viewer-box">
    <div class="json-viewer-header">
      <span class="json-viewer-title" id="jv-title">JSON 데이터</span>
      <div class="json-viewer-actions">
        <button class="json-viewer-btn jvb-scope active" id="jv-scope-current" onclick="setJsonScope('current')">현재 에디션</button>
        <button class="json-viewer-btn jvb-scope" id="jv-scope-all" onclick="setJsonScope('all')">전체</button>
        <button class="json-viewer-btn jvb-copy" onclick="copyJson()">복사</button>
        <button class="json-viewer-btn jvb-download" onclick="downloadJson()">다운로드</button>
        <button class="json-viewer-btn jvb-close" onclick="closeJsonViewer()">✕</button>
      </div>
    </div>
    <div class="json-viewer-tabs">
      <button class="json-tab-btn active" id="jv-tab-view" onclick="switchJsonTab('view')">👁 보기</button>
      <button class="json-tab-btn" id="jv-tab-edit" onclick="switchJsonTab('edit')">✏️ 편집 후 저장</button>
    </div>
    <div class="json-viewer-body" id="jv-panel-view"><div class="json-code" id="jv-code"></div></div>
    <div class="json-viewer-body" id="jv-panel-edit" style="display:none;flex-direction:column;">
      <textarea class="json-editor" id="jv-editor" oninput="validateJsonEditor()" spellcheck="false"></textarea>
      <div class="json-editor-toolbar">
        <span class="json-editor-status" id="jv-editor-status">JSON을 직접 수정하세요.</span>
        <button class="json-viewer-btn" style="background:#3A7A5A;color:white;" onclick="applyJsonEdit()">Firebase에 저장</button>
        <button class="json-viewer-btn" style="background:#3A3A50;color:#C9C9E0;" onclick="formatJsonEditor()">포맷 정렬</button>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, onValue, set, remove, get } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';
const firebaseConfig = {
  apiKey:"AIzaSyBIH03tDDCNSZHdq0_ru-4LnvaehECycSY",
  authDomain:"hrsignal.firebaseapp.com",
  databaseURL:"https://hrsignal-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:"hrsignal", storageBucket:"hrsignal.firebasestorage.app",
  messagingSenderId:"978655131936", appId:"1:978655131936:web:74ed0e629baa74e8f93f45"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
window._db=db; window._ref=ref; window._set=set; window._remove=remove;

Promise.all([
  new Promise(resolve => onValue(ref(db,'editions'), snap => resolve(snap.val()||{}), {onlyOnce:true})),
  get(ref(db,'config/current_edition'))
]).then(([edData, curSnap]) => {
  window._data = edData;
  window._currentEditionKey = curSnap.val() || null;
  window._keys = sortEditionKeys(edData);
  renderSidebar();
  onValue(ref(db,'editions'), snap => {
    window._data = snap.val()||{};
    window._keys = sortEditionKeys(window._data);
    renderSidebar();
  });
});
</script>

<script>
window._data={}; window._keys=[]; window._currentKey=null; window._currentEditionKey=null;
window._jsonScope='current'; window._jsonTab='view';
const SEC_CATS=['노사관계','노동법/정책','채용/퇴직','조직/문화','보상/복리후생','교육/개발','AI/디지털HR','글로벌HR','기타'];

window._pool = [];
window._top5 = [null,null,null,null,null];
window._ep   = null;
window._draggingId = null;
window._draggingSlotIdx = null;
window._autoScrollTimer = null;
window._sidebarScrollTimer = null; // ★ 사이드바 전용 스크롤 타이머

function generateId() { return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }

function sortEditionKeys(data) {
  return Object.keys(data).sort((a, b) => {
    const psA = data[a]?.period_start || '';
    const psB = data[b]?.period_start || '';
    if (psA && psB) return psB.localeCompare(psA);
    if (psA && !psB) return -1;
    if (!psA && psB) return 1;
    return b.localeCompare(a);
  });
}

/* ════ 사이드바 ════ */
function renderSidebar() {
  const list = document.getElementById('edition-list');
  list.innerHTML='';
  (_keys||[]).forEach(k=>{
    const ed=_data[k];
    const isCurrent = k === window._currentEditionKey;
    const item=document.createElement('div');
    item.className='edition-item'+(k===_currentKey?' active':'');
    item.dataset.editionKey = k; // ★ 드롭 식별용

    // ★ 에디션 아이템에 드롭 이벤트 추가
    item.addEventListener('dragover', e => editionDragOver(e, item, k));
    item.addEventListener('dragleave', e => editionDragLeave(e, item));
    item.addEventListener('drop', e => editionDrop(e, k));

    item.innerHTML=`
      <div class="edition-item-info" onclick="selectEdition('${k}')" style="cursor:pointer;">
        <div class="edition-item-title">
          ${esc(ed.title||k)}
          ${isCurrent ? '<span class="current-badge">이번주호</span>' : ''}
        </div>
        <div class="edition-item-date">${esc(ed.period||ed.period_start||ed.date||'')}</div>
      </div>
      <div class="edition-actions">
        ${!isCurrent ? `<button class="edition-star-btn" title="이번 주 호로 설정" onclick="setCurrentEdition('${k}')">★</button>` : ''}
        <button class="edition-del-btn" title="삭제" onclick="deleteEdition('${k}')">✕</button>
      </div>`;
    list.appendChild(item);
  });
}

/* ★ 에디션 드롭존 이벤트 핸들러 */
function editionDragOver(e, item, key) {
  // 기사 드래그 중일 때만, 현재 에디션이 아닌 다른 에디션으로만 허용
  if(!window._draggingId) return;
  if(key === _currentKey) return;
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  item.classList.add('drop-target');
  // 사이드바 자동 스크롤
  autoScrollSidebar(e.clientY);
}

function editionDragLeave(e, item) {
  if(!item.contains(e.relatedTarget)) {
    item.classList.remove('drop-target');
  }
}

function editionDrop(e, targetKey) {
  e.preventDefault();
  stopSidebarAutoScroll();
  // 모든 drop-target 클래스 제거
  document.querySelectorAll('.edition-item.drop-target').forEach(el => el.classList.remove('drop-target'));

  const id = window._draggingId;
  if(!id || targetKey === _currentKey) return;

  const art = _pool.find(a => a._id === id);
  if(!art) return;

  const targetEd = _data[targetKey];
  if(!targetEd) return;

  const sourceTitle = _data[_currentKey]?.title || _currentKey;
  const targetTitle = targetEd.title || targetKey;

  if(!confirm(`"${art.title || '(제목 없음)'}"\n\n[${sourceTitle}] → [${targetTitle}]으로 이동할까요?`)) return;

  // 1. 현재 에디션에서 제거
  _pool = _pool.filter(a => a._id !== id);
  _top5 = _top5.map(t => t && t._id === id ? null : t);
  if(_ep && _ep._id === id) _ep = null;

  // 2. 대상 에디션의 sections에 기사 추가
  const tEd = JSON.parse(JSON.stringify(targetEd)); // 깊은 복사
  const cat = art.category || '기타';
  let secFound = (tEd.sections||[]).find(s => s.title === cat);
  if(!secFound) {
    if(!tEd.sections) tEd.sections = [];
    secFound = { title: cat, articles: [] };
    tEd.sections.push(secFound);
  }
  secFound.articles.push({...art});

  // 3. 현재 에디션 저장 (기사 제거 반영)
  saveAll(true);

  // 4. 대상 에디션 Firebase 저장
  _set(_ref(_db, `editions/${targetKey}`), tEd)
    .then(() => {
      toast(`✓ "${targetTitle}"으로 이동 완료`);
      renderPool();
      renderSlots();
    })
    .catch(err => toast('이동 실패: ' + err.message));
}

function selectEdition(key) {
  _currentKey=key;
  document.querySelectorAll('.edition-item').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.edition-item').forEach(el=>{
    if(el.dataset.editionKey === key) el.classList.add('active');
  });
  loadEdition(_data[key]);
  if(document.getElementById('json-viewer-modal').classList.contains('show')) refreshJsonViewer();
}

function setCurrentEdition(key) {
  const title = _data[key]?.title || key;
  _set(_ref(_db,'config/current_edition'), key)
    .then(() => {
      window._currentEditionKey = key;
      renderSidebar();
      toast(`✓ "${title}"이(가) 이번 주 호로 설정되었습니다.`);
    })
    .catch(err => toast('설정 실패: '+err.message));
}

function deleteEdition(key) {
  const title=_data[key]?.title||key;
  if(!confirm(`"${title}" 에디션을 삭제할까요?\n\n이 작업은 되돌릴 수 없습니다.`)) return;
  _remove(_ref(_db,`editions/${key}`)).then(()=>{
    toast(`"${title}" 에디션이 삭제되었습니다.`);
    if(_currentKey===key){ _currentKey=null; renderEmptyMain(); }
    if(window._currentEditionKey===key){
      window._currentEditionKey=null;
      _set(_ref(_db,'config/current_edition'), null);
    }
  }).catch(err=>toast('삭제 실패: '+err.message));
}

/* ★ createNewEdition: Firebase 즉시 저장 버그 수정 */
function createNewEdition() {
  const key=new Date().toISOString().split('T')[0]+'_'+Date.now().toString(36);
  const newEd={title:`HR시그널 #${(_keys.length+1)}`,date:'',period:'',period_start:'',period_end:'',intro_title:'이번 주 HR 핵심 이슈',intro:'',top5:[],editors_pick:null,sections:[]};
  // Firebase에 먼저 저장
  _set(_ref(_db, `editions/${key}`), newEd)
    .then(() => {
      toast('새 에디션이 생성되었습니다.');
    })
    .catch(err => toast('생성 실패: '+err.message));
  // 로컬에도 즉시 반영
  _data[key]=newEd;
  _keys = sortEditionKeys(_data);
  _currentKey=key;
  renderSidebar();
  loadEdition(newEd);
}

function renderEmptyMain() {
  document.getElementById('admin-main').innerHTML=`<div class="empty-state" style="margin:auto;"><h3>에디션을 선택하거나 새로 만드세요</h3><p>왼쪽 사이드바에서 에디션을 선택하면 편집할 수 있습니다.</p></div>`;
}

function loadEdition(ed) {
  _pool = [];
  (ed.sections||[]).forEach(sec=>{
    (sec.articles||[]).forEach(a=>{
      _pool.push({...a, _id: a._id||generateId(), category: a.category||sec.title||''});
    });
  });
  _top5 = [null,null,null,null,null];
  (ed.top5||[]).forEach((t,i)=>{
    if(i>=5) return;
    const found = _pool.find(a=>a._id&&t._id ? a._id===t._id : a.title===t.title);
    _top5[i] = found ? {...found, badge:t.badge||null} : {...t, _id:t._id||generateId(), badge:t.badge||null};
  });
  _ep = null;
  if(ed.editors_pick) {
    const found = _pool.find(a=>a._id&&ed.editors_pick._id ? a._id===ed.editors_pick._id : a.title===ed.editors_pick.title);
    _ep = found ? {...found} : {...ed.editors_pick, _id:ed.editors_pick._id||generateId()};
  }
  renderMain(ed);
}

function renderMain(ed) {
  const main = document.getElementById('admin-main');
  main.innerHTML=`
    <div class="info-bar">
      <div class="fg fg-title"><label>에디션 제목</label><input id="f-title" value="${esc(ed.title||'')}" placeholder="5월 4주차"></div>
      <div class="fg fg-date"><label>발행일</label><input type="date" id="f-date" value="${esc(ed.date||'')}"></div>
      <div class="fg fg-period"><label>기간 시작</label><input type="date" id="f-period-start" value="${esc(ed.period_start||'')}"></div>
      <div class="fg fg-period"><label>기간 종료</label><input type="date" id="f-period-end" value="${esc(ed.period_end||'')}"></div>
      <div class="fg fg-intro"><label>에디션 소개글</label><textarea id="f-intro" placeholder="이번 주 주요 내용...">${esc(ed.intro||'')}</textarea></div>
    </div>
    <div class="editor-body">
      <div class="pool-panel">
        <div class="pool-toolbar">
          <span class="pool-toolbar-title">기사 목록</span>
          <select class="pool-cat-filter" id="cat-filter" onchange="renderPool()">
            <option value="">전체 카테고리</option>
            ${SEC_CATS.map(c=>`<option value="${c}">${c}</option>`).join('')}
          </select>
          <button class="btn-add-art" onclick="addArticle()">+ 기사 추가</button>
        </div>
        <div class="pool-scroll" id="pool-scroll"
          ondragover="poolDragOver(event)" ondragleave="poolDragLeave(event)" ondrop="poolDrop(event)">
        </div>
      </div>
      <div class="assign-panel" id="assign-panel">
        <div class="assign-section">
          <div class="assign-section-title">🏆 이번 주 Top 5 <span>기사를 드래그하거나 버튼으로 지정</span></div>
          ${[0,1,2,3,4].map(i=>`
          <div class="slot" id="slot-top5-${i}"
            ondragover="slotDragOver(event,this)" ondragleave="slotDragLeave(event,this)"
            ondrop="slotDrop(event,'top5',${i})">
            <div class="slot-num">0${i+1}</div>
            <div class="slot-empty-hint">기사를 여기에 드롭</div>
          </div>`).join('')}
        </div>
        <div class="assign-section">
          <div class="assign-section-title">★ Editor's Pick <span>1개 지정</span></div>
          <div class="slot ep-slot" id="slot-ep"
            ondragover="slotDragOver(event,this)" ondragleave="slotDragLeave(event,this)"
            ondrop="slotDrop(event,'ep',0)">
            <div class="slot-empty-hint">기사를 여기에 드롭하거나 목록에서 → EP</div>
          </div>
        </div>
      </div>
    </div>`;
  renderPool();
  renderSlots();
}

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderPool() {
  const scroll = document.getElementById('pool-scroll');
  if(!scroll) return;
  const catFilter = document.getElementById('cat-filter')?.value||'';
  const groups = {};
  _pool.filter(a=>!catFilter||a.category===catFilter).forEach(a=>{
    const c = a.category||'기타';
    if(!groups[c]) groups[c]=[];
    groups[c].push(a);
  });
  if(!_pool.length){ scroll.innerHTML=`<div style="text-align:center;padding:40px 0;color:var(--ink-light);font-size:12px;">+ 기사 추가 버튼으로 기사를 등록하세요</div>`; return; }
  let html='';
  const cats = catFilter ? [catFilter] : SEC_CATS.filter(c=>groups[c]?.length).concat(Object.keys(groups).filter(c=>!SEC_CATS.includes(c)&&groups[c]?.length));
  cats.forEach(cat=>{
    const arts=groups[cat]||[];
    if(!arts.length) return;
    html+=`<div class="cat-group">
      <div class="cat-group-header">${cat} <span class="cat-group-count">${arts.length}</span></div>`;
    arts.forEach(a=>{
      const isTop5 = _top5.some(t=>t&&t._id===a._id);
      const isEP   = _ep && _ep._id===a._id;
      const assignClass = isTop5?'assigned-top5':isEP?'assigned-ep':'';
      html+=`<div class="art-card ${assignClass}" id="artcard-${a._id}"
        draggable="true"
        ondragstart="artDragStart(event,'${a._id}')"
        ondragend="artDragEnd(event)">
        <div class="art-card-header" onclick="toggleArtCard('${a._id}')">
          <span class="art-card-cat" style="background:${catColor(a.category)}">${a.category||'미분류'}</span>
          <span class="art-card-title">${esc(a.title||'(제목 없음)')}</span>
          <span class="art-card-date">${esc(a.date||'')}</span>
          <div class="art-card-actions" onclick="event.stopPropagation()">
            ${isTop5?`<span class="btn-xs" style="background:#FDEEE9;color:var(--red);border-color:#FACCCC;">Top5</span>`:''}
            ${isEP?`<span class="btn-xs" style="background:#F3EEFF;color:#8B5CF6;border-color:#C4B5FD;">EP</span>`:''}
            ${!isTop5?`<button class="btn-xs" onclick="assignTop5('${a._id}')">→ Top5</button>`:''}
            ${!isEP?`<button class="btn-xs" onclick="assignEP('${a._id}')">→ EP</button>`:''}
            <button class="btn-xs del" onclick="deleteArticle('${a._id}')">삭제</button>
          </div>
        </div>
        <div class="art-card-body" id="artbody-${a._id}">
          ${artFormHtml(a)}
        </div>
      </div>`;
    });
    html+='</div>';
  });
  scroll.innerHTML=html;
}

function catColor(cat) {
  const colors={'노사관계':'#7A5A3A','노동법/정책':'#2A5A8A','채용/퇴직':'#3A7A5A','조직/문화':'#8A4A7A','보상/복리후생':'#5A7A2A','교육/개발':'#6A4A8A','AI/디지털HR':'#2A6A7A','글로벌HR':'#7A3A4A','기타':'#8A7F6A'};

    <div class="art-form-row">
      <div class="art-fg"><label>카테고리</label>

function toggleArtCard(id) {
  const body = document.getElementById('artbody-'+id);
  const card = document.getElementById('artcard-'+id);
  if(!body) return;
  const isOpening = !body.classList.contains('open');
  body.classList.toggle('open');
  if(card) { card.classList.toggle('editing', isOpening); card.draggable = !isOpening; }
}

function addArticle() {
  const catFilter = document.getElementById('cat-filter')?.value||'';
  const a = {_id:generateId(), title:'', date:'', category:catFilter||'', source:'', sub:'', summary:'', url:'', points:[], tags:[]};
  _pool.push(a);
  renderPool();
  setTimeout(()=>{
    const body=document.getElementById('artbody-'+a._id);
    if(body){ body.classList.add('open'); body.scrollIntoView({behavior:'smooth',block:'nearest'}); }
  }, 50);
}

function saveArticle(id, btn) {
  const card = btn.closest('.art-card');
  const body = card.querySelector('.art-card-body');
  const art = _pool.find(a=>a._id===id);
  if(!art) return;
  art.title    = body.querySelector('.af-title')?.value||'';
  art.date     = body.querySelector('.af-date')?.value||'';
  art.category = body.querySelector('.af-cat')?.value||'';
  art.source   = body.querySelector('.af-source')?.value||'';
  art.sub      = body.querySelector('.af-sub')?.value||'';
  art.summary  = body.querySelector('.af-summary')?.value||'';
  art.url      = body.querySelector('.af-url')?.value||'';
  art.points   = [];
  body.querySelectorAll('.points-list .point-row input').forEach(inp=>{ if(inp.value.trim()) art.points.push(inp.value.trim()); });
  art.tags=[];
  body.querySelectorAll('.tag-chip').forEach(chip=>{ art.tags.push(chip.textContent.replace('✕','').trim()); });
  _top5 = _top5.map(t=>t&&t._id===id ? {...t,...art} : t);
  if(_ep&&_ep._id===id) _ep={..._ep,...art};
  saveAll(true);
  renderPool();
  renderSlots();
}

function deleteArticle(id) {
  if(!confirm('이 기사를 삭제할까요?')) return;
  _pool = _pool.filter(a=>a._id!==id);
  _top5 = _top5.map(t=>t&&t._id===id ? null : t);
  if(_ep&&_ep._id===id) _ep=null;
  renderPool(); renderSlots();
  toast('기사가 삭제되었습니다.');
}

function assignTop5(id) {
  const art = _pool.find(a=>a._id===id); if(!art) return;
  if(_top5.some(t=>t&&t._id===id)){ toast('이미 Top5에 있습니다.'); return; }
  const emptyIdx = _top5.findIndex(t=>!t);
  if(emptyIdx===-1){ toast('Top5는 최대 5개까지입니다.'); return; }
  _top5[emptyIdx]={...art, badge:null};
  renderPool(); renderSlots(); saveAll(true);
}

function assignEP(id) {
  const art = _pool.find(a=>a._id===id); if(!art) return;
  _ep={...art};
  renderPool(); renderSlots(); saveAll(true);
}

function removeFromTop5(idx) { _top5[idx]=null; renderPool(); renderSlots(); saveAll(true); }
function removeEP() { _ep=null; renderPool(); renderSlots(); saveAll(true); }

function updateTop5Badge(idx, field, val) {
  if(!_top5[idx]) return;
  if(!_top5[idx].badge) _top5[idx].badge={label:'',type:'hot'};
  _top5[idx].badge[field]=val;
}

function renderSlots() {
  [0,1,2,3,4].forEach(i=>{
    const slot=document.getElementById(`slot-top5-${i}`); if(!slot) return;
    const t=_top5[i];
    if(!t){
      slot.className='slot'; slot.draggable=false; slot.ondragstart=null;
      slot.innerHTML=`<div class="slot-num">0${i+1}</div><div class="slot-empty-hint">기사를 드롭하거나 목록에서 → Top5</div>`;
      return;
    }
    const bl=t.badge?.label||''; const bt=t.badge?.type||'hot';
    slot.className='slot filled'; slot.draggable=true;
    slot.ondragstart=(e)=>slotDragStart(e,i);
    slot.ondragend=(e)=>slotDragEnd(e,i);
    slot.innerHTML=`
      <div class="slot-content">
        <span class="slot-drag-handle" title="드래그로 순서 변경">⠿</span>
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:3px;">
            <span class="slot-num" style="margin:0">0${i+1}</span>
            <div class="slot-title">${esc(t.title||'')}</div>
          </div>
          <div class="slot-meta">${esc(t.category||'')} · ${esc(t.date||'')} · ${esc(t.source||'')}</div>
          <div class="slot-badge-row">
            <input class="slot-badge-input" placeholder="뱃지 텍스트 (HOT 등)" value="${esc(bl)}"
              onchange="updateTop5Badge(${i},'label',this.value)" onclick="event.stopPropagation()">
            <select class="slot-badge-select" onchange="updateTop5Badge(${i},'type',this.value)" onclick="event.stopPropagation()">
              <option value="hot" ${bt==='hot'?'selected':''}>🔴 hot</option>
              <option value="new" ${bt==='new'?'selected':''}>🟢 new</option>
              <option value="trend" ${bt==='trend'?'selected':''}>🔵 trend</option>
            </select>
          </div>
        </div>
        <button class="slot-remove" onclick="removeFromTop5(${i});event.stopPropagation()">✕</button>
      </div>`;
  });
  const epSlot=document.getElementById('slot-ep'); if(!epSlot) return;
  if(!_ep){ epSlot.className='slot ep-slot'; epSlot.innerHTML=`<div class="slot-empty-hint">기사를 여기에 드롭하거나 목록에서 → EP</div>`; return; }
  epSlot.className='slot ep-slot filled';
  epSlot.innerHTML=`
    <div class="slot-content">
      <div style="flex:1">
        <div class="slot-title">${esc(_ep.title||'')}</div>
        <div class="slot-meta">${esc(_ep.category||'')} · ${esc(_ep.date||'')} · ${esc(_ep.source||'')}</div>
      </div>
      <button class="slot-remove" onclick="removeEP()">✕</button>
    </div>`;
}

/* ════ 드래그 앤 드롭 ════ */
function artDragStart(e, id) {
  window._draggingId = id; window._draggingSlotIdx = null;
  e.dataTransfer.effectAllowed='move'; e.dataTransfer.setData('text/plain','');
  setTimeout(()=>{
    const el=document.getElementById('artcard-'+id);
    if(el) el.classList.add('dragging');
    // ★ 사이드바 드래그 힌트 배너 표시
    document.getElementById('sidebar-drag-hint').classList.add('show');
  },0);
}

function artDragEnd(e) {
  stopAutoScroll();
  stopSidebarAutoScroll();
  if(window._draggingId){ const el=document.getElementById('artcard-'+window._draggingId); if(el) el.classList.remove('dragging'); }
  window._draggingId=null;
  document.querySelectorAll('.slot').forEach(s=>s.classList.remove('slot-drag-over'));
  // ★ 사이드바 드롭타깃 & 힌트 초기화
  document.querySelectorAll('.edition-item.drop-target').forEach(el=>el.classList.remove('drop-target'));
  document.getElementById('sidebar-drag-hint').classList.remove('show');
}

function slotDragStart(e, fromIdx) {
  window._draggingSlotIdx = fromIdx; window._draggingId = null;
  e.dataTransfer.effectAllowed='move'; e.dataTransfer.setData('text/plain','');
  setTimeout(()=>{ const slot=document.getElementById(`slot-top5-${fromIdx}`); if(slot) slot.classList.add('slot-dragging'); },0);
}
function slotDragEnd(e, fromIdx) {
  stopAutoScroll(); window._draggingSlotIdx=null;
  document.querySelectorAll('.slot').forEach(s=>{ s.classList.remove('slot-drag-over'); s.classList.remove('slot-dragging'); });
}
function slotDragOver(e, el) { e.preventDefault(); e.dataTransfer.dropEffect='move'; el.classList.add('slot-drag-over'); autoScroll(e.clientY); }
function slotDragLeave(e, el) { if(!el.contains(e.relatedTarget)) el.classList.remove('slot-drag-over'); }
function slotDrop(e, type, toIdx) {
  e.preventDefault();
  document.querySelectorAll('.slot').forEach(s=>s.classList.remove('slot-drag-over','slot-dragging'));
  if(window._draggingSlotIdx !== null && type === 'top5') {
    const from = window._draggingSlotIdx;
    if(from === toIdx) return;
    const moved = _top5[from]; _top5[from] = _top5[toIdx]; _top5[toIdx] = moved;
    window._draggingSlotIdx = null;
    renderPool(); renderSlots(); saveAll(true); return;
  }
  const id = window._draggingId; if(!id) return;
  const art = _pool.find(a=>a._id===id); if(!art) return;
  if(type==='top5'){
    _top5 = _top5.map((t,i)=>t&&t._id===id&&i!==toIdx ? null : t);
    _top5[toIdx]={...art, badge:_top5[toIdx]?.badge||null};
  } else { _ep={...art}; }
  renderPool(); renderSlots(); saveAll(true);
}
function poolDragOver(e) { e.preventDefault(); e.dataTransfer.dropEffect='move'; autoScroll(e.clientY); }
function poolDragLeave(e) {}
function poolDrop(e) { e.preventDefault(); }

/* ★ 기사 목록 자동 스크롤 */
function autoScroll(clientY) {
  const main=document.getElementById('pool-scroll'); if(!main) return;
  const rect=main.getBoundingClientRect();
  if(window._autoScrollTimer){ clearInterval(window._autoScrollTimer); window._autoScrollTimer=null; }
  if(clientY<rect.top+70) window._autoScrollTimer=setInterval(()=>main.scrollTop-=10,16);
  else if(clientY>rect.bottom-70) window._autoScrollTimer=setInterval(()=>main.scrollTop+=10,16);
}
function stopAutoScroll(){ if(window._autoScrollTimer){clearInterval(window._autoScrollTimer);window._autoScrollTimer=null;} }

/* ★ 사이드바 자동 스크롤 */
function autoScrollSidebar(clientY) {
  const sidebar = document.getElementById('sidebar'); if(!sidebar) return;
  const rect = sidebar.getBoundingClientRect();
  if(window._sidebarScrollTimer){ clearInterval(window._sidebarScrollTimer); window._sidebarScrollTimer=null; }
  if(clientY < rect.top + 60) window._sidebarScrollTimer = setInterval(()=>sidebar.scrollTop-=8, 16);
  else if(clientY > rect.bottom - 60) window._sidebarScrollTimer = setInterval(()=>sidebar.scrollTop+=8, 16);
}
function stopSidebarAutoScroll(){ if(window._sidebarScrollTimer){clearInterval(window._sidebarScrollTimer);window._sidebarScrollTimer=null;} }

/* ════ 태그 / 포인트 ════ */
function addTag(e,input) {
  if(e.key==='Enter'&&input.value.trim()){
    e.preventDefault();
    const chip=document.createElement('span'); chip.className='tag-chip';
    chip.innerHTML=`${input.value.trim()}<button onclick="removeTag(this)">✕</button>`;
    input.before(chip); input.value='';
  }
}
function removeTag(btn){ btn.parentElement.remove(); }
function addPoint(btn){
  const container=btn.previousElementSibling;
  const row=document.createElement('div'); row.className='point-row';
  row.innerHTML=`<input type="text" placeholder="핵심 포인트"><button class="btn-xs del" onclick="removePoint(this)">✕</button>`;
  container.appendChild(row);
}
function removePoint(btn){ btn.parentElement.remove(); }

/* ════ 저장 ════ */
function formatPeriod(s,e){
  const fmt=d=>{if(!d)return'';const[y,m,day]=d.split('-');return`${y}년 ${parseInt(m)}월 ${parseInt(day)}일`;};
  if(s&&e) return`${fmt(s)} ~ ${fmt(e)}`; if(s) return fmt(s); return'';
}

function saveAll(silent=false) {
  if(!_currentKey){ if(!silent) toast('에디션을 먼저 선택해주세요.'); return; }
  const ps=document.getElementById('f-period-start')?.value||'';
  const pe=document.getElementById('f-period-end')?.value||'';
  const secMap={};
  _pool.forEach(a=>{ const c=a.category||'기타'; if(!secMap[c]) secMap[c]=[]; secMap[c].push(a); });
  const sections=Object.entries(secMap).map(([title,articles])=>({title,articles}));
  const edition={
    title: document.getElementById('f-title')?.value||'',
    date:  document.getElementById('f-date')?.value||'',
    period_start:ps, period_end:pe,
    period: formatPeriod(ps,pe)||document.getElementById('f-date')?.value||'',
    intro_title:'이번 주 HR 핵심 이슈',
    intro: document.getElementById('f-intro')?.value||'',
    top5: _top5.filter(Boolean).map(t=>({
      _id:t._id, title:t.title||'', date:t.date||'', category:t.category||'',
      source:t.source||'', sub:t.sub||'', summary:t.summary||'',
      url:t.url||'', points:t.points||[], tags:t.tags||[],
      ...(t.badge&&t.badge.label?{badge:t.badge}:{})
    })),
    editors_pick: _ep ? {
      _id:_ep._id, title:_ep.title||'', date:_ep.date||'', category:_ep.category||'',
      source:_ep.source||'', sub:_ep.sub||'', summary:_ep.summary||'',
      url:_ep.url||'', points:_ep.points||[], tags:_ep.tags||[]
    } : null,
    sections
  };
  _set(_ref(_db,`editions/${_currentKey}`),edition)
    .then(()=>{
      toast(silent?'✓ 자동 저장':'✓ 저장되어 발행되었습니다!');
      if(_data[_currentKey]) { _data[_currentKey]=edition; _keys=sortEditionKeys(_data); }
      renderSidebar();
    })
    .catch(err=>toast('저장 실패: '+err.message));
}

/* ════ JSON 뷰어 ════ */
function openJsonViewer(){
  if(_jsonScope==='current'&&!_currentKey){toast('에디션을 먼저 선택해 주세요.');return;}
  document.getElementById('json-viewer-modal').classList.add('show');
  refreshJsonViewer();
}
function closeJsonViewer(){ document.getElementById('json-viewer-modal').classList.remove('show'); }
function setJsonScope(s){
  _jsonScope=s;
  document.getElementById('jv-scope-current').classList.toggle('active',s==='current');
  document.getElementById('jv-scope-all').classList.toggle('active',s==='all');
  refreshJsonViewer();
}
function switchJsonTab(t){
  _jsonTab=t;
  document.getElementById('jv-tab-view').classList.toggle('active',t==='view');
  document.getElementById('jv-tab-edit').classList.toggle('active',t==='edit');
  document.getElementById('jv-panel-view').style.display=t==='view'?'':'none';
  document.getElementById('jv-panel-edit').style.display=t==='edit'?'flex':'none';
  if(t==='edit'){document.getElementById('jv-editor').value=JSON.stringify(getJsonData(),null,2);validateJsonEditor();}
}
function getJsonData(){ return _jsonScope==='all'?{editions:_data}:{editions:{[_currentKey]:_data[_currentKey]}}; }
function refreshJsonViewer(){
  const data=getJsonData();
  const label=_jsonScope==='all'?`전체 에디션 (${_keys.length}개)`:(_data[_currentKey]?.title||_currentKey);
  document.getElementById('jv-title').textContent=`{ } ${label}`;
  document.getElementById('jv-code').innerHTML=syntaxHighlight(JSON.stringify(data,null,2));
  if(_jsonTab==='edit'){document.getElementById('jv-editor').value=JSON.stringify(data,null,2);validateJsonEditor();}
}
function syntaxHighlight(json){
  json=json.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g,m=>{
    let cls='json-num';
    if(/^"/.test(m)){cls=/:$/.test(m)?'json-key':'json-str';}
    else if(/true|false/.test(m)){cls='json-bool';}
    else if(/null/.test(m)){cls='json-null';}
    return`<span class="${cls}">${m}</span>`;
  });
}
function copyJson(){ navigator.clipboard.writeText(JSON.stringify(getJsonData(),null,2)).then(()=>toast('✓ JSON 복사됨')).catch(()=>toast('복사 실패')); }
function downloadJson(){
  const blob=new Blob([JSON.stringify(getJsonData(),null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download=`${_jsonScope==='all'?'hrsignal_all':(_currentKey||'edition')}.json`; a.click();
  URL.revokeObjectURL(a.href); toast('JSON 다운로드 시작');
}
function validateJsonEditor(){
  const st=document.getElementById('jv-editor-status');
  const v=document.getElementById('jv-editor').value.trim();
  if(!v){st.textContent='JSON을 입력해 주세요.';st.className='json-editor-status';return false;}
  try{JSON.parse(v);st.textContent='✓ 유효한 JSON입니다.';st.className='json-editor-status ok';return true;}
  catch(e){st.textContent='✗ '+e.message;st.className='json-editor-status error';return false;}
}
function formatJsonEditor(){
  const el=document.getElementById('jv-editor');
  try{el.value=JSON.stringify(JSON.parse(el.value),null,2);validateJsonEditor();}
  catch(e){toast('포맷 실패');}
}
function applyJsonEdit(){
  if(!validateJsonEditor()){toast('JSON 오류를 먼저 수정해 주세요.');return;}
  const parsed=JSON.parse(document.getElementById('jv-editor').value);
  const editions=parsed.editions||parsed;
  if(typeof editions!=='object'||!Object.keys(editions).length){toast('editions 데이터를 찾을 수 없습니다.');return;}
  if(!confirm(`Firebase에 저장할까요?\n범위: ${_jsonScope==='all'?'전체 에디션 (덮어씀)':'현재 에디션만'}`)) return;
  const saveOp=_jsonScope==='all'?_set(_ref(_db,'editions'),editions):_set(_ref(_db,`editions/${_currentKey}`),editions[_currentKey]||editions);
  saveOp.then(()=>{toast('✓ Firebase에 저장되었습니다!');closeJsonViewer();}).catch(err=>toast('저장 실패: '+err.message));
}

/* ════ JSON 업로드 ════ */
function showJsonUpload(){document.getElementById('json-modal').style.display='flex';document.getElementById('json-input').value='';document.getElementById('json-error').style.display='none';}
function closeJsonUpload(){document.getElementById('json-modal').style.display='none';}
function uploadJson(){
  const raw=document.getElementById('json-input').value.trim();
  const errEl=document.getElementById('json-error'); errEl.style.display='none';
  if(!raw){errEl.textContent='JSON을 입력해주세요.';errEl.style.display='block';return;}
  let parsed;
  try{parsed=JSON.parse(raw);}catch(e){errEl.textContent='JSON 형식 오류: '+e.message;errEl.style.display='block';return;}
  const editions=parsed.editions||parsed;
  if(typeof editions!=='object'){errEl.textContent='editions 키를 찾을 수 없습니다.';errEl.style.display='block';return;}
  const keys=Object.keys(editions);
  if(!keys.length){errEl.textContent='추가할 에디션이 없습니다.';errEl.style.display='block';return;}
  Promise.all(keys.map(k=>_set(_ref(_db,`editions/${k}`),editions[k])))
    .then(()=>{closeJsonUpload();toast(`✓ ${keys.length}개 에디션 추가: ${keys.join(', ')}`);})
    .catch(err=>{errEl.textContent='업로드 실패: '+err.message;errEl.style.display='block';});
}

/* ════ 조회수 분석 ════ */
window._viewsData = null;
window._viewsTab = 'editions';
window._viewsScope = 'all';

function openViewsAnalytics() {
  document.getElementById('views-modal').classList.add('show');
  loadViewsData();
}
function closeViewsAnalytics() { document.getElementById('views-modal').classList.remove('show'); }

function loadViewsData() {
  document.getElementById('views-body').innerHTML = '<div class="views-loading">📊 Firebase에서 조회수 데이터를 불러오는 중...</div>';
  const db = window._db; const ref = window._ref;
  if(!db) { renderViewsError('Firebase 연결 없음'); return; }
  import('https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js')
    .then(({onValue, ref: dbRef}) => {
      onValue(dbRef(db, 'views'), snap => {
        window._viewsData = snap.val() || {};
        renderViewsModal();
      }, { onlyOnce: true });
    })
    .catch(()=> { renderViewsError('데이터 로드 실패. Firebase 연결을 확인해주세요.'); });
}

function renderViewsModal() {
  const vd = window._viewsData || {};
  const editionKeys = Object.keys(vd);
  const tab = window._viewsTab;
  const scope = window._viewsScope;
  const edNames = {};
  (_keys||[]).forEach(k => { edNames[k] = _data[k]?.title || k; });
  const scopedKeys = scope === 'all' ? editionKeys : (editionKeys.includes(scope) ? [scope] : []);
  const totalViews = scopedKeys.reduce((s,k) => s + (vd[k]?.total || 0), 0);
  const maxEdKey = scopedKeys.reduce((best,k) => (!best || (vd[k]?.total||0) > (vd[best]?.total||0)) ? k : best, null);
  const avgViews = scopedKeys.length ? Math.round(totalViews / scopedKeys.length) : 0;
  const totalArticleViews = scopedKeys.reduce((s,k) => s + Object.values(vd[k]?.articles||{}).reduce((a,b)=>a+b, 0), 0);
  const edRank = scopedKeys.map(k => ({
    key: k, title: edNames[k] || k,
    views: vd[k]?.total || 0,
    articleViews: Object.values(vd[k]?.articles||{}).reduce((a,b)=>a+b,0),
    lastUpdated: vd[k]?.lastUpdated || null
  })).sort((a,b) => b.views - a.views);
  const artRankMap = {};
  scopedKeys.forEach(k => {
    const arts = vd[k]?.articles || {};
    Object.entries(arts).forEach(([aid, cnt]) => {
      if(!artRankMap[aid]) artRankMap[aid] = { id: aid, views: 0, editions: [] };
      artRankMap[aid].views += cnt;
      artRankMap[aid].editions.push({ edKey: k, edTitle: edNames[k]||k, cnt });
    });
  });
  const artRank = Object.values(artRankMap).map(a => {
    let title = a.id;
    (_keys||[]).forEach(ek => {
      const ed = _data[ek];
      const all = [...(ed?.top5||[]), ...(ed?.sections||[]).flatMap(s=>s.articles||[]), ed?.editors_pick].filter(Boolean);
      const found = all.find(x => x._id === a.id);
      if(found && found.title) title = found.title;
    });
    return {...a, title};
  }).sort((a,b) => b.views - a.views);
  const maxEdViews = edRank[0]?.views || 1;
  const maxArtViews = artRank[0]?.views || 1;
  const scopeButtons = `
    <span class="views-scope-label">범위:</span>
    <button class="views-scope-btn ${scope==='all'?'active':''}" onclick="setViewsScope('all')">전체 에디션</button>
    ${(_keys||[]).map(k=>`<button class="views-scope-btn ${scope===k?'active':''}" onclick="setViewsScope('${k}')">${edNames[k]||k}</button>`).join('')}
  `;
  let tabContent = '';
  if(tab === 'editions') {
    if(!edRank.length) { tabContent = `<div class="views-empty"><div class="views-empty-icon">📭</div>조회수 데이터가 없습니다.</div>`; }
    else {
      tabContent = `
        <div class="views-chart-wrap">
          <div class="views-section-title">에디션별 조회수 순위</div>
          ${edRank.map((e,i) => `<div class="bar-row"><span class="bar-label" title="${esc(e.title)}">${esc(e.title)}</span><div class="bar-track"><div class="bar-fill ${i===0?'top1':i===1?'top2':i===2?'top3':''}" style="width:${Math.round(e.views/maxEdViews*100)}%"></div></div><span class="bar-val">${e.views.toLocaleString()}</span></div>`).join('')}
        </div>
        <div class="views-chart-wrap">
          <div class="views-section-title">에디션 상세 테이블</div>
          <table class="views-table"><thead><tr><th style="width:32px">순위</th><th>에디션</th><th style="width:90px;text-align:right">페이지뷰</th><th style="width:90px;text-align:right">기사 클릭</th><th style="width:120px">비율</th></tr></thead><tbody>
          ${edRank.map((e,i) => `<tr><td><span class="views-rank-badge ${i===0?'r1':i===1?'r2':i===2?'r3':''}">${i+1}</span></td><td><div style="font-weight:500;color:var(--ink)">${esc(e.title)}</div>${e.lastUpdated?`<div style="font-size:10px;color:var(--ink-light)">${new Date(e.lastUpdated).toLocaleString('ko-KR')}</div>`:''}</td><td style="text-align:right;font-weight:600">${e.views.toLocaleString()}</td><td style="text-align:right;color:var(--ink-mid)">${e.articleViews.toLocaleString()}</td><td><div class="views-progress-mini"><div class="views-progress-fill" style="width:${Math.round(e.views/maxEdViews*100)}%"></div></div></td></tr>`).join('')}
          </tbody></table>
        </div>`;
    }
  } else {
    if(!artRank.length) { tabContent = `<div class="views-empty"><div class="views-empty-icon">📰</div>기사별 클릭 데이터가 없습니다.</div>`; }
    else {
      tabContent = `
        <div class="views-chart-wrap">
          <div class="views-section-title">기사별 클릭 순위 TOP ${Math.min(artRank.length,15)}</div>
          ${artRank.slice(0,15).map((a,i) => `<div class="bar-row"><span class="bar-label" title="${esc(a.title)}">${i+1}. ${esc(a.title)}</span><div class="bar-track"><div class="bar-fill ${i===0?'top1':i===1?'top2':i===2?'top3':''}" style="width:${Math.round(a.views/maxArtViews*100)}%"></div></div><span class="bar-val">${a.views.toLocaleString()}</span></div>`).join('')}
        </div>`;
    }
  }
  document.getElementById('views-body').innerHTML = `
    <div class="views-scope-bar">${scopeButtons}</div>
    <div class="views-kpi-row">
      <div class="views-kpi highlight"><div class="views-kpi-label">총 페이지뷰</div><div class="views-kpi-val">${totalViews.toLocaleString()}</div><div class="views-kpi-sub">${scopedKeys.length}개 에디션 합산</div></div>
      <div class="views-kpi"><div class="views-kpi-label">에디션 평균 조회수</div><div class="views-kpi-val">${avgViews.toLocaleString()}</div><div class="views-kpi-sub">에디션당 평균</div></div>
      <div class="views-kpi"><div class="views-kpi-label">기사 총 클릭수</div><div class="views-kpi-val">${totalArticleViews.toLocaleString()}</div><div class="views-kpi-sub">원문 링크 클릭 합계</div></div>
      <div class="views-kpi"><div class="views-kpi-label">최다 조회 에디션</div><div class="views-kpi-val" style="font-size:14px;padding-top:4px;">${maxEdKey ? esc((edNames[maxEdKey]||maxEdKey).slice(0,12)) : '-'}</div><div class="views-kpi-sub">${maxEdKey ? (vd[maxEdKey]?.total||0).toLocaleString()+'회' : '-'}</div></div>
    </div>
    <div class="views-tab-row">
      <button class="views-tab ${tab==='editions'?'active':''}" onclick="setViewsTab('editions')">📅 에디션별</button>
      <button class="views-tab ${tab==='articles'?'active':''}" onclick="setViewsTab('articles')">📰 기사별 클릭</button>
      <button class="views-refresh-btn" onclick="loadViewsData()">↻ 새로고침</button>
    </div>
    ${tabContent}`;
}

function setViewsTab(t) { window._viewsTab = t; renderViewsModal(); }
function setViewsScope(s) { window._viewsScope = s; renderViewsModal(); }
function renderViewsError(msg) { document.getElementById('views-body').innerHTML = `<div class="views-empty"><div class="views-empty-icon">⚠️</div>${msg}</div>`; }

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeJsonViewer();closeJsonUpload();closeViewsAnalytics();}});
</script>
</body>
</html>
