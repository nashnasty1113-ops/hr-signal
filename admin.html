<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR 시그널 관리자</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #F5F0E8;
    --cream-dark: #EDE7D9;
    --cream-border: #D8D0C0;
    --ink: #2A2218;
    --ink-mid: #5A5040;
    --ink-light: #8A7F6A;
    --accent-red: #C94A2A;
    --accent-green: #3A7A5A;
    --accent-blue: #2A5A8A;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--cream);
    color: var(--ink);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    min-height: 100vh;
  }

  .admin-header {
    background: var(--ink);
    color: var(--cream);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .admin-logo { font-family: 'Noto Serif KR', serif; font-size: 17px; font-weight: 700; }
  .admin-logo span { color: #E07A3A; }
  .header-actions { display: flex; gap: 8px; }

  .btn {
    padding: 7px 16px; border-radius: 4px; cursor: pointer;
    font-size: 12px; font-family: 'Noto Sans KR', sans-serif;
    border: none; transition: opacity 0.15s;
  }
  .btn:hover { opacity: 0.85; }
  .btn-outline { background: transparent; border: 1px solid rgba(255,255,255,0.3); color: var(--cream); }
  .btn-white   { background: var(--cream); color: var(--ink); }
  .btn-danger  { background: var(--accent-red); color: white; }
  .btn-success { background: var(--accent-green); color: white; }
  .btn-blue    { background: var(--accent-blue); color: white; }

  .admin-layout { display: flex; min-height: calc(100vh - 56px); }

  /* ─── SIDEBAR ─── */
  .sidebar { width: 260px; border-right: 1px solid var(--cream-border); padding: 20px 0; background: var(--cream); flex-shrink: 0; }
  .sidebar-label { font-size: 10px; letter-spacing: 2px; color: var(--ink-light); padding: 0 18px 8px; }
  .edition-item { padding: 10px 18px; cursor: pointer; border-left: 3px solid transparent; transition: all 0.15s; }
  .edition-item:hover { background: var(--cream-dark); }
  .edition-item.active { border-left-color: var(--accent-red); background: var(--cream-dark); }
  .edition-item-title { font-size: 13px; font-weight: 500; color: var(--ink); }
  .edition-item-date  { font-size: 11px; color: var(--ink-light); margin-top: 2px; }
  .add-edition-btn {
    margin: 12px 18px 0; width: calc(100% - 36px); padding: 9px;
    border: 1px dashed var(--cream-border); border-radius: 4px;
    background: none; cursor: pointer; font-size: 12px; color: var(--ink-light);
    font-family: 'Noto Sans KR', sans-serif; text-align: center; transition: all 0.15s;
  }
  .add-edition-btn:hover { border-color: var(--ink-mid); color: var(--ink); }

  /* ─── MAIN PANEL ─── */
  .admin-main { flex: 1; padding: 28px 36px; overflow-y: auto; }
  .section-block { margin-bottom: 32px; background: white; border: 1px solid var(--cream-border); border-radius: 6px; overflow: hidden; }
  .section-block-header { padding: 14px 20px; background: var(--cream-dark); border-bottom: 1px solid var(--cream-border); display: flex; align-items: center; justify-content: space-between; }
  .section-block-title { font-size: 13px; font-weight: 500; color: var(--ink); }
  .section-block-body { padding: 16px 20px; }

  .form-row { display: flex; gap: 12px; margin-bottom: 12px; }
  .form-group { flex: 1; display: flex; flex-direction: column; gap: 4px; }
  label { font-size: 11px; color: var(--ink-light); letter-spacing: 0.5px; }

  input[type="text"], input[type="date"], input[type="url"], select, textarea {
    padding: 8px 10px; border: 1px solid var(--cream-border); border-radius: 4px;
    font-size: 13px; font-family: 'Noto Sans KR', sans-serif;
    background: white; color: var(--ink); outline: none; transition: border-color 0.15s; width: 100%;
  }
  input:focus, textarea:focus, select:focus { border-color: var(--ink-mid); }
  textarea { resize: vertical; min-height: 70px; }

  .article-card { border: 1px solid var(--cream-border); border-radius: 5px; margin-bottom: 10px; overflow: hidden; }
  .article-card-header { padding: 10px 14px; background: var(--cream); display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none; }
  .article-card-header:hover { background: var(--cream-dark); }
  .article-card-num { font-size: 11px; font-weight: 500; color: var(--ink-mid); margin-right: 10px; }
  .article-card-title-preview { flex: 1; font-size: 12px; color: var(--ink); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .article-card-actions { display: flex; gap: 6px; }
  .btn-sm { padding: 4px 10px; font-size: 11px; border-radius: 3px; cursor: pointer; border: 1px solid var(--cream-border); background: white; color: var(--ink-mid); font-family: 'Noto Sans KR', sans-serif; transition: background 0.15s; }
  .btn-sm:hover { background: var(--cream-dark); }
  .btn-sm.delete { border-color: #FACCCC; color: var(--accent-red); }
  .btn-sm.delete:hover { background: #FEF0F0; }
  .article-card-body { padding: 14px 14px; border-top: 1px solid var(--cream-border); display: none; }
  .article-card-body.open { display: block; }

  .tags-input-wrap { display: flex; flex-wrap: wrap; gap: 5px; padding: 6px 8px; border: 1px solid var(--cream-border); border-radius: 4px; background: white; cursor: text; min-height: 36px; align-items: center; }
  .tag-chip { background: var(--cream-dark); border: 1px solid var(--cream-border); border-radius: 10px; padding: 2px 8px; font-size: 11px; color: var(--ink-mid); display: flex; align-items: center; gap: 4px; }
  .tag-chip button { background: none; border: none; cursor: pointer; color: var(--ink-light); font-size: 11px; padding: 0; line-height: 1; }
  .tags-input { border: none !important; outline: none; font-size: 12px; font-family: 'Noto Sans KR', sans-serif; min-width: 80px; flex: 1; padding: 0 !important; background: transparent; }

  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--ink); color: var(--cream); padding: 12px 20px; border-radius: 6px; font-size: 13px; transform: translateY(80px); opacity: 0; transition: all 0.3s; z-index: 999; }
  .toast.show { transform: translateY(0); opacity: 1; }

  .point-row { display: flex; gap: 8px; margin-bottom: 6px; align-items: center; }
  .point-row input { flex: 1; }
  .btn-add-row { padding: 6px 12px; border: 1px dashed var(--cream-border); border-radius: 4px; background: none; cursor: pointer; font-size: 11px; color: var(--ink-light); font-family: 'Noto Sans KR', sans-serif; margin-top: 4px; }
  .btn-add-row:hover { border-color: var(--ink-mid); color: var(--ink); }

  .empty-state { text-align: center; padding: 48px 0; color: var(--ink-light); }
  .empty-state h3 { font-size: 16px; margin-bottom: 8px; color: var(--ink-mid); }

  /* ─── TOP5 ─── */
  .top5-panel { display: grid; grid-template-columns: 1fr 1fr; gap: 0; min-height: 320px; }
  .top5-pool { border-right: 1px solid var(--cream-border); padding: 16px; max-height: 520px; overflow-y: auto; }
  .top5-selected { padding: 16px; max-height: 520px; overflow-y: auto; }
  .top5-panel-label { font-size: 10px; letter-spacing: 2px; color: var(--ink-light); margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
  .top5-panel-label strong { font-size: 12px; color: var(--ink-mid); letter-spacing: 0; font-weight: 500; }
  .pool-section-group { margin-bottom: 14px; }
  .pool-section-name { font-size: 10px; letter-spacing: 1px; color: var(--ink-light); padding: 4px 0; border-bottom: 1px solid var(--cream-border); margin-bottom: 6px; }
  .pool-article-item { display: flex; align-items: center; gap: 8px; padding: 7px 10px; border-radius: 4px; border: 1px solid transparent; margin-bottom: 4px; cursor: pointer; transition: all 0.13s; background: white; }
  .pool-article-item:hover { border-color: var(--cream-border); background: var(--cream-dark); }
  .pool-article-item.in-top5 { opacity: 0.45; cursor: default; }
  .pool-article-item.in-top5:hover { background: white; border-color: transparent; }
  .pool-article-text { flex: 1; font-size: 12px; line-height: 1.4; color: var(--ink); word-break: keep-all; }
  .pool-article-meta { font-size: 10px; color: var(--ink-light); white-space: nowrap; }
  .pool-add-btn { background: var(--accent-green); color: white; border: none; border-radius: 3px; padding: 3px 8px; font-size: 11px; cursor: pointer; white-space: nowrap; font-family: 'Noto Sans KR', sans-serif; flex-shrink: 0; }
  .pool-add-btn:hover { opacity: 0.85; }
  .top5-selected-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 12px; border: 1px solid var(--cream-border); border-radius: 5px; margin-bottom: 8px; background: white; cursor: grab; }
  .top5-selected-item:active { cursor: grabbing; }
  .top5-selected-item.drag-over { border-color: var(--accent-red); background: #FEF0F0; }
  .top5-rank-num { font-size: 22px; font-weight: 700; color: var(--accent-red); line-height: 1; min-width: 28px; padding-top: 2px; }
  .top5-selected-item:nth-child(2) .top5-rank-num { color: var(--ink-mid); }
  .top5-selected-item:nth-child(n+3) .top5-rank-num { color: var(--cream-border); }
  .top5-selected-body { flex: 1; }
  .top5-selected-title { font-size: 12px; font-weight: 500; line-height: 1.4; color: var(--ink); word-break: keep-all; margin-bottom: 4px; }
  .top5-selected-sec { font-size: 10px; color: var(--ink-light); }
  .top5-selected-badge { display: flex; flex-direction: column; gap: 4px; align-items: flex-end; flex-shrink: 0; }
  .top5-badge-input { font-size: 11px; padding: 3px 7px; border: 1px solid var(--cream-border); border-radius: 3px; background: white; width: 80px; font-family: 'Noto Sans KR', sans-serif; }
  .top5-badge-select { font-size: 11px; padding: 3px 6px; border: 1px solid var(--cream-border); border-radius: 3px; background: white; width: 80px; font-family: 'Noto Sans KR', sans-serif; }
  .top5-remove-btn { background: none; border: 1px solid #FACCCC; color: var(--accent-red); border-radius: 3px; padding: 3px 7px; font-size: 11px; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; }
  .top5-remove-btn:hover { background: #FEF0F0; }
  .top5-empty-msg { text-align: center; padding: 32px 16px; color: var(--ink-light); font-size: 12px; border: 1px dashed var(--cream-border); border-radius: 5px; }
  .top5-drag-hint { font-size: 10px; color: var(--ink-light); text-align: center; margin-top: 8px; letter-spacing: 0.5px; }

  .edition-form-block { background: white; border: 1px solid var(--cream-border); border-radius: 6px; padding: 20px; margin-bottom: 24px; }
  .edition-form-title { font-size: 13px; font-weight: 500; color: var(--ink); margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid var(--cream-border); }

  /* ─── 기사 드래그 ─── */
  .article-card.dragging { opacity: 0.4; border: 1px dashed var(--accent-blue); }
  .article-card.is-editing { cursor: default; }
  .section-block-body.drag-over-section {
    background: #EEF4FF;
    outline: 2px dashed var(--accent-blue);
    outline-offset: -2px;
    border-radius: 4px;
    min-height: 48px;
  }
  .drag-handle {
    color: var(--cream-border); font-size: 15px;
    padding: 0 8px 0 0; cursor: grab; user-select: none;
    flex-shrink: 0; transition: color .12s;
    line-height: 1;
  }
  .drag-handle:hover { color: var(--ink-mid); }
  .article-card.is-editing .drag-handle { cursor: not-allowed; color: var(--cream-border); opacity: 0.4; }

  /* ─── 섹션 헤더 버튼 레이아웃 ─── */
  .section-block-header {
    padding: 12px 16px;
    background: var(--cream-dark);
    border-bottom: 1px solid var(--cream-border);
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
  }
  .sec-header-left { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; }
  .sec-header-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
  .btn-add-article {
    padding: 6px 14px; font-size: 12px;
    background: var(--accent-green); color: white;
    border: none; border-radius: 4px; cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    white-space: nowrap; transition: opacity .15s;
  }
  .btn-add-article:hover { opacity: .85; }
  .btn-del-section {
    padding: 6px 10px; font-size: 12px;
    background: none; color: var(--accent-red);
    border: 1px solid #FACCCC; border-radius: 4px; cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    white-space: nowrap; transition: background .15s;
  }
  .btn-del-section:hover { background: #FEF0F0; }

  /* ─── 저장 버튼 강조 ─── */
  .btn-save {
    background: var(--accent-red); color: white;
    font-weight: 600; letter-spacing: 0.3px;
    box-shadow: 0 2px 8px rgba(201,74,42,0.35);
  }
  .btn-save:hover { opacity: .9; }

  /* ─── JSON 뷰어 모달 ─── */
  .json-viewer-modal {
    display: none; position: fixed; inset: 0;
    background: rgba(42,34,24,0.6); z-index: 400;
    align-items: center; justify-content: center; padding: 20px;
  }
  .json-viewer-modal.show { display: flex; }
  .json-viewer-box {
    background: #1E1E2E; border-radius: 8px;
    width: 100%; max-width: 760px; max-height: 90vh;
    display: flex; flex-direction: column;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    overflow: hidden;
  }
  .json-viewer-header {
    background: #2A2A3E; padding: 14px 18px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid #3A3A50; flex-shrink: 0;
  }
  .json-viewer-title { font-size: 13px; font-weight: 500; color: #C9C9E0; letter-spacing: 0.5px; }
  .json-viewer-actions { display: flex; gap: 8px; align-items: center; }
  .json-viewer-btn {
    padding: 6px 14px; border-radius: 4px; cursor: pointer;
    font-size: 12px; font-family: 'Noto Sans KR', sans-serif; border: none;
    transition: opacity .15s;
  }
  .json-viewer-btn:hover { opacity: 0.85; }
  .jvb-scope { background: #3A3A50; color: #C9C9E0; font-size: 11px; }
  .jvb-scope.active { background: #5A5A7A; color: white; }
  .jvb-copy     { background: #3A7A5A; color: white; }
  .jvb-download { background: #2A5A8A; color: white; }
  .jvb-close    { background: none; border: 1px solid #4A4A60 !important; color: #8A8AAA; font-size: 14px; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; border-radius: 50%; padding: 0; }

  .json-viewer-tabs {
    display: flex; gap: 0; background: #252535; border-bottom: 1px solid #3A3A50; flex-shrink: 0;
  }
  .json-tab-btn {
    padding: 8px 16px; font-size: 11px; color: #7A7A9A;
    background: none; border: none; cursor: pointer;
    border-bottom: 2px solid transparent; font-family: 'Noto Sans KR', sans-serif;
    transition: all .15s;
  }
  .json-tab-btn:hover { color: #C9C9E0; }
  .json-tab-btn.active { color: #E07A3A; border-bottom-color: #E07A3A; }

  .json-viewer-body { flex: 1; overflow: auto; position: relative; }
  .json-code {
    padding: 20px; font-family: 'Consolas', 'Monaco', monospace;
    font-size: 12.5px; line-height: 1.7; color: #CDD6F4;
    white-space: pre; tab-size: 2; min-height: 100%;
    background: #1E1E2E;
  }
  /* JSON 문법 색상 */
  .json-key    { color: #89DCEB; }
  .json-str    { color: #A6E3A1; }
  .json-num    { color: #FAB387; }
  .json-bool   { color: #CBA6F7; }
  .json-null   { color: #7F849C; }
  .json-punct  { color: #7F849C; }

  /* 편집 모드 */
  .json-editor {
    width: 100%; height: 100%; min-height: 400px;
    padding: 20px; font-family: 'Consolas','Monaco',monospace;
    font-size: 12.5px; line-height: 1.7; color: #CDD6F4;
    background: #1E1E2E; border: none; outline: none; resize: none;
    tab-size: 2;
  }
  .json-editor-toolbar {
    background: #252535; padding: 10px 18px;
    display: flex; align-items: center; gap: 10px;
    border-top: 1px solid #3A3A50; flex-shrink: 0;
  }
  .json-editor-status { font-size: 11px; color: #7A7A9A; flex: 1; }
  .json-editor-status.error { color: #F38BA8; }
  .json-editor-status.ok    { color: #A6E3A1; }
</style>
</head>
<body>

<header class="admin-header">
  <div class="admin-logo">HR<span>시그널</span> 관리자</div>
  <div class="header-actions">
    <a href="index.html" class="btn btn-outline">← 뉴스레터 보기</a>
    <button class="btn btn-blue" onclick="openJsonViewer()">{ } JSON 보기/편집</button>
    <button class="btn btn-save" onclick="saveAll()">💾 저장 & 발행</button>
  </div>
</header>

<div class="admin-layout">
  <aside class="sidebar">
    <div class="sidebar-label">에디션 목록</div>
    <div id="edition-list"></div>
    <button class="add-edition-btn" onclick="createNewEdition()">+ 새 에디션 추가</button>
    <button class="add-edition-btn" onclick="showJsonUpload()" style="margin-top:6px;border-color:#C94A2A;color:#C94A2A;">↑ JSON으로 업로드</button>
  </aside>

  <main class="admin-main" id="admin-main">
    <div class="empty-state">
      <h3>에디션을 선택하거나 새로 만드세요</h3>
      <p>왼쪽 사이드바에서 에디션을 선택하면 편집할 수 있습니다.</p>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<!-- JSON 업로드 모달 -->
<div style="display:none;position:fixed;inset:0;background:rgba(42,34,24,0.55);z-index:300;align-items:center;justify-content:center;" id="json-modal">
  <div style="background:#F5F0E8;border-radius:8px;padding:28px;width:560px;max-width:95vw;border:1px solid #D8D0C0;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
      <div>
        <div style="font-family:'Noto Serif KR',serif;font-size:16px;font-weight:700;color:#2A2218;">JSON으로 에디션 추가</div>
        <div style="font-size:12px;color:#8A7F6A;margin-top:3px;">기존 에디션은 유지되고 새 에디션만 추가됩니다.</div>
      </div>
      <button onclick="closeJsonUpload()" style="background:none;border:1px solid #D8D0C0;border-radius:50%;width:28px;height:28px;cursor:pointer;font-size:14px;color:#5A5040;">✕</button>
    </div>
    <textarea id="json-input" placeholder='제가 드린 JSON을 여기에 붙여넣으세요.'
      style="width:100%;height:220px;padding:12px;border:1px solid #D8D0C0;border-radius:4px;font-size:12px;font-family:monospace;background:white;color:#2A2218;resize:vertical;outline:none;"></textarea>
    <div id="json-error" style="font-size:12px;color:#C94A2A;margin-top:6px;display:none;"></div>
    <div style="display:flex;gap:8px;margin-top:12px;">
      <button onclick="closeJsonUpload()" style="padding:10px 16px;border:1px solid #D8D0C0;border-radius:4px;background:none;cursor:pointer;font-size:13px;color:#5A5040;font-family:'Noto Sans KR',sans-serif;">취소</button>
      <button onclick="uploadJson()" style="flex:1;padding:10px;background:#2A2218;color:#F5F0E8;border:none;border-radius:4px;cursor:pointer;font-size:13px;font-family:'Noto Sans KR',sans-serif;">업로드</button>
    </div>
  </div>
</div>

<!-- ★ JSON 뷰어/편집 모달 -->
<div class="json-viewer-modal" id="json-viewer-modal">
  <div class="json-viewer-box">
    <div class="json-viewer-header">
      <span class="json-viewer-title" id="jv-title">JSON 데이터</span>
      <div class="json-viewer-actions">
        <!-- 범위 토글 -->
        <button class="json-viewer-btn jvb-scope active" id="jv-scope-current" onclick="setJsonScope('current')">현재 에디션</button>
        <button class="json-viewer-btn jvb-scope" id="jv-scope-all" onclick="setJsonScope('all')">전체</button>
        <!-- 탭 -->
        <button class="json-viewer-btn jvb-copy" onclick="copyJson()">복사</button>
        <button class="json-viewer-btn jvb-download" onclick="downloadJson()">다운로드</button>
        <button class="json-viewer-btn jvb-close" onclick="closeJsonViewer()">✕</button>
      </div>
    </div>
    <!-- 보기 / 편집 탭 -->
    <div class="json-viewer-tabs">
      <button class="json-tab-btn active" id="jv-tab-view" onclick="switchJsonTab('view')">👁 보기</button>
      <button class="json-tab-btn" id="jv-tab-edit" onclick="switchJsonTab('edit')">✏️ 편집 후 저장</button>
    </div>
    <!-- 보기 패널 -->
    <div class="json-viewer-body" id="jv-panel-view">

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';

const firebaseConfig = {

<script>
window._data = {};
window._keys = [];
window._currentKey = null;
window._jsonScope = 'current'; // 'current' | 'all'
window._jsonTab = 'view';
const SEC_CATS = ['노사관계','노동법/정책','채용/퇴직','조직/문화','보상/복리후생','교육/개발','AI/디지털HR','글로벌HR','기타'];

document.addEventListener('dragend', () => {
  stopAutoScroll();
  if (window._dragCard) {
    window._dragCard.classList.remove('dragging');
    window._dragCard = null;
  }
  document.querySelectorAll('.drag-over-section').forEach(el => el.classList.remove('drag-over-section'));
});

/* ════ JSON 뷰어 ════ */

function openJsonViewer() {
  if (_jsonScope === 'current' && !_currentKey) {
    toast('에디션을 먼저 선택해 주세요.'); return;
  }
  document.getElementById('json-viewer-modal').classList.add('show');
  refreshJsonViewer();
}

function closeJsonViewer() {
  document.getElementById('json-viewer-modal').classList.remove('show');
}

function setJsonScope(scope) {
  _jsonScope = scope;
  document.getElementById('jv-scope-current').classList.toggle('active', scope === 'current');
  document.getElementById('jv-scope-all').classList.toggle('active', scope === 'all');
  refreshJsonViewer();
}

function switchJsonTab(tab) {
  _jsonTab = tab;
  document.getElementById('jv-tab-view').classList.toggle('active', tab === 'view');
  document.getElementById('jv-tab-edit').classList.toggle('active', tab === 'edit');
  document.getElementById('jv-panel-view').style.display = tab === 'view' ? '' : 'none';
  document.getElementById('jv-panel-edit').style.display = tab === 'edit' ? 'flex' : 'none';
  if (tab === 'edit') {
    // 에디터에 현재 JSON 채우기
    const data = getJsonData();
    document.getElementById('jv-editor').value = JSON.stringify(data, null, 2);
    validateJsonEditor();
  }
}

function getJsonData() {
  if (_jsonScope === 'all') {
    return { editions: _data };
  } else {
    return { editions: { [_currentKey]: _data[_currentKey] } };
  }
}

function refreshJsonViewer() {
  const data = getJsonData();
  const label = _jsonScope === 'all'
    ? `전체 에디션 (${_keys.length}개)`
    : `${_data[_currentKey]?.title || _currentKey}`;
  document.getElementById('jv-title').textContent = `{ } ${label}`;

  // 보기 탭 렌더
  document.getElementById('jv-code').innerHTML = syntaxHighlight(JSON.stringify(data, null, 2));

  // 편집 탭도 열려있으면 갱신
  if (_jsonTab === 'edit') {
    document.getElementById('jv-editor').value = JSON.stringify(data, null, 2);
    validateJsonEditor();
  }
}

// JSON 문법 하이라이팅
function syntaxHighlight(json) {
  json = json.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, (match) => {
    let cls = 'json-num';
    if (/^"/.test(match)) {
      cls = /:$/.test(match) ? 'json-key' : 'json-str';
    } else if (/true|false/.test(match)) {
      cls = 'json-bool';
    } else if (/null/.test(match)) {
      cls = 'json-null';
    }
    return `<span class="${cls}">${match}</span>`;
  });
}

function copyJson() {
  const data = getJsonData();
  navigator.clipboard.writeText(JSON.stringify(data, null, 2))
    .then(() => toast('✓ JSON이 클립보드에 복사되었습니다.'))
    .catch(() => toast('복사 실패 — 수동으로 선택해 주세요.'));
}

function downloadJson() {
  const data = getJsonData();
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  const label = _jsonScope === 'all' ? 'hrsignal_all' : (_currentKey || 'edition');
  a.download = `${label}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
  toast('JSON 파일 다운로드 시작');
}

/* ── 편집 모드 ── */
function validateJsonEditor() {
  const statusEl = document.getElementById('jv-editor-status');
  const val = document.getElementById('jv-editor').value.trim();
  if (!val) { statusEl.textContent = 'JSON을 입력해 주세요.'; statusEl.className = 'json-editor-status'; return false; }
  try {
    JSON.parse(val);
    statusEl.textContent = '✓ 유효한 JSON입니다.';
    statusEl.className = 'json-editor-status ok';
    return true;
  } catch(e) {
    statusEl.textContent = '✗ ' + e.message;
    statusEl.className = 'json-editor-status error';
    return false;
  }
}

function formatJsonEditor() {
  const el = document.getElementById('jv-editor');
  try {
    el.value = JSON.stringify(JSON.parse(el.value), null, 2);
    validateJsonEditor();
  } catch(e) { toast('포맷 실패: JSON이 올바르지 않습니다.'); }
}

function applyJsonEdit() {
  if (!validateJsonEditor()) { toast('JSON 오류를 먼저 수정해 주세요.'); return; }
  const parsed = JSON.parse(document.getElementById('jv-editor').value);
  const editions = parsed.editions || parsed;

  if (typeof editions !== 'object' || !Object.keys(editions).length) {
    toast('editions 데이터를 찾을 수 없습니다.'); return;
  }

  if (!confirm(`Firebase에 저장할까요?\n범위: ${_jsonScope === 'all' ? '전체 에디션 (덮어씀)' : '현재 에디션만'}`)) return;

  const saveScope = _jsonScope === 'all'
    ? _set(_ref(_db, 'editions'), editions)
    : _set(_ref(_db, `editions/${_currentKey}`), editions[_currentKey] || editions);

  saveScope
    .then(() => {
      toast('✓ Firebase에 저장되었습니다!');
      closeJsonViewer();
    })
    .catch(err => toast('저장 실패: ' + err.message));
}

/* ════ 사이드바 ════ */
function renderSidebar() {
  const list = document.getElementById('edition-list');
  list.innerHTML = '';
  _keys.forEach(k => {
    const ed = _data[k];
    const item = document.createElement('div');
    item.className = 'edition-item' + (k === _currentKey ? ' active' : '');
    item.style.cssText = 'display:flex;align-items:center;justify-content:space-between;';
    item.innerHTML = `
      <div onclick="selectEditionByKey('${k}')" style="flex:1;cursor:pointer;">
        <div class="edition-item-title">${ed.title || k}</div>

        padding:4px 6px;border-radius:3px;flex-shrink:0;line-height:1;"

        onmouseout="this.style.color='#8A7F6A';this.style.background='none'">✕</button>`;
    list.appendChild(item);

}

function selectEditionByKey(key) {
  _currentKey = key;
  document.querySelectorAll('.edition-item').forEach(el => el.classList.remove('active'));

  items.forEach(el => {
    if (el.querySelector(`[onclick="selectEditionByKey('${key}')"]`)) el.classList.add('active');

  renderEditor(_data[key]);

  if (document.getElementById('json-viewer-modal').classList.contains('show')) refreshJsonViewer();

function deleteEdition(key) {
  const title = _data[key]?.title || key;
  if (!confirm(`"${title}" 에디션을 삭제할까요?\n\n이 작업은 되돌릴 수 없습니다.`)) return;
  _remove(_ref(_db, `editions/${key}`)).then(() => {

function applyCardEdit(btn) {

  const header = card.querySelector('.article-card-header');
  const body = card.querySelector('.article-card-body');
  // 헤더 미리보기 업데이트
  const titleInput = body.querySelector('.art-title');
  if (titleInput) header.querySelector('.article-card-title-preview').textContent = titleInput.value || '(제목 없음)';
  // Top5 pool 갱신 — DOM에서 읽어 _editingEdition.sections 메모리 동기화
  syncSectionsFromDom();
  renderPoolArticles();
  toast('적용되었습니다. 헤더의 저장 & 발행으로 최종 저장하세요.');
}

// DOM에 있는 섹션/기사 데이터를 _editingEdition.sections에 동기화
function syncSectionsFromDom() {
  const sections = [];
  document.querySelectorAll('.section-block').forEach((block) => {
    const titleInput = block.querySelector('[id^="sec-title-"]');
    if (!titleInput) return;
    const articles = [];
    block.querySelectorAll('.article-card').forEach(card => {
      articles.push(collectArticleFromCard(card, false));
    });
    sections.push({ title: titleInput.value, articles });
  });
  if (window._editingEdition) window._editingEdition.sections = sections;
}

function toggleCard(header) {
  const card = header.closest('.article-card');
  const body = header.nextElementSibling;
  const isOpening = !body.classList.contains('open');
  body.classList.toggle('open');
  if (card) card.classList.toggle('is-editing', isOpening);
  const input = body.querySelector('.art-title');
  if (input) header.querySelector('.article-card-title-preview').textContent = input.value || '(제목 없음)';
}

function addArticle(type, secIdx) {
  const blank = {title:'',date:'',category:'',source:'',summary:'',sub:'',points:[],tags:[],url:''};
  if (type==='top5') {
    if (!window._editingEdition.top5) window._editingEdition.top5=[];
    const idx = window._editingEdition.top5.length;
    window._editingEdition.top5.push(blank);
    document.getElementById('top5-list').insertAdjacentHTML('beforeend', articleCard(blank,'top5',idx,true));
  } else {
    const sec = window._editingEdition.sections[secIdx];
    if (!sec.articles) sec.articles=[];
    const idx = sec.articles.length;
    sec.articles.push(blank);
    document.getElementById(`sec-${secIdx}-list`).insertAdjacentHTML('beforeend', articleCard(blank,'sec',idx,false,secIdx));
    syncSectionsFromDom();
    renderPoolArticles();
  }
}

function deleteArticle(e, type, idx, secIdx) {
  e.stopPropagation();
  if (!confirm('이 기사를 삭제할까요?')) return;
  const card = e.target.closest('.article-card');
  if (type==='sec') {
    window._top5Selected = (window._top5Selected||[]).filter(s=>!(s._secIdx==secIdx && s._artIdx==idx));
    renderTop5Panel();
  }
  card.remove(); toast('기사가 삭제되었습니다.');
}

function addSection() {
  if (!window._editingEdition.sections) window._editingEdition.sections=[];
  const si = window._editingEdition.sections.length;
  window._editingEdition.sections.push({title:'',articles:[]});
  // 이미 사용 중인 카테고리 계산
  const used = window._editingEdition.sections.slice(0,si).map(s=>s.title).filter(Boolean);
  const optionsHtml = SEC_CATS.map(c => {
    const disabled = used.includes(c) ? 'disabled style="color:#ccc;"' : '';
    return `<option value="${c}" ${disabled}>${c}${used.includes(c)?' (사용 중)':''}</option>`;
  }).join('');
  const html = `<div class="section-block">
    <div class="section-block-header">
      <div class="sec-header-left">
        <select id="sec-title-${si}" class="sec-title-select" onchange="onSectionTitleChange(this)"
          style="border:1px solid var(--cream-border);background:var(--cream);font-size:13px;font-weight:500;font-family:'Noto Sans KR',sans-serif;color:var(--ink);border-radius:4px;padding:4px 8px;outline:none;cursor:pointer;max-width:200px;">
          <option value="">-- 섹션 선택 --</option>
          ${optionsHtml}
        </select>
      </div>
      <div class="sec-header-right">
        <button class="btn-add-article" onclick="addArticle('sec',${si})">+ 기사 추가</button>
        <button class="btn-del-section" onclick="deleteSection(${si})">섹션 삭제</button>
      </div>
    </div>
    <div class="section-block-body" id="sec-${si}-list"
      ondragover="sectionDragOver(event,this)"
      ondragleave="sectionDragLeave(event,this)"
      ondrop="sectionDrop(event,this,${si})"></div>
  </div>`;
  document.querySelector('.add-edition-btn').insertAdjacentHTML('beforebegin', html);
  // 다른 섹션들의 드롭다운도 갱신
  refreshAllSectionSelects();
  toast('새 섹션이 추가되었습니다.');
}

function deleteSection(si) {
  if (!confirm('이 섹션을 삭제할까요?')) return;
  event.target.closest('.section-block').remove();
  refreshAllSectionSelects();
  toast('섹션이 삭제되었습니다.');
}

/* ════ 섹션 중복 방지 ════ */
function onSectionTitleChange(selectEl) {
  const newVal = selectEl.value;
  const allSelects = [...document.querySelectorAll('.sec-title-select')];
  // 자기 자신 제외 다른 셀렉트에서 같은 값이 있으면 막기
  const usedByOthers = allSelects
    .filter(s => s !== selectEl)
    .map(s => s.value)
    .filter(Boolean);
  if (usedByOthers.includes(newVal)) {
    toast(`"${newVal}" 섹션은 이미 사용 중입니다.`);
    selectEl.value = ''; // 선택 되돌리기
    return;
  }
  refreshAllSectionSelects();
}

function refreshAllSectionSelects() {
  const allSelects = [...document.querySelectorAll('.sec-title-select')];
  const usedAll = allSelects.map(s => s.value).filter(Boolean);
  allSelects.forEach(sel => {
    const myVal = sel.value;
    const usedByOthers = usedAll.filter(v => v !== myVal);
    [...sel.options].forEach(opt => {
      if (!opt.value) return;
      const isUsed = usedByOthers.includes(opt.value);
      opt.disabled = isUsed;
      opt.textContent = opt.value + (isUsed ? ' (사용 중)' : '');
    });
  });
}

/* ════ 기사 드래그 앤 드롭 (섹션 간 이동) ════ */
window._dragCard = null;
window._autoScrollTimer = null;

function articleDragStart(e, cardEl) {
  // 편집 중(펼쳐진) 카드는 드래그 금지
  const body = cardEl.querySelector('.article-card-body');
  if (body && body.classList.contains('open')) {
    e.preventDefault();
    return;
  }
  // 핸들에서만 드래그 허용 — 다른 곳(input, textarea 등)에서 시작하면 막기
  const handle = cardEl.querySelector('.drag-handle');
  if (!handle) { e.preventDefault(); return; }
  // e.target이 handle 또는 그 자손인지 확인
  if (!handle.contains(e.target) && e.target !== handle) {
    e.preventDefault();
    return;
  }
  window._dragCard = cardEl;
  cardEl.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', '');
}

function sectionDragOver(e, bodyEl) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  bodyEl.classList.add('drag-over-section');
  // 자동 스크롤
  autoScrollOnDrag(e.clientY);
}

function sectionDragLeave(e, bodyEl) {
  if (!bodyEl.contains(e.relatedTarget)) {
    bodyEl.classList.remove('drag-over-section');
  }
}

// 자동 스크롤: 화면 상단/하단 80px 안에 들어오면 스크롤
function autoScrollOnDrag(clientY) {
  const ZONE = 80;
  const SPEED = 12;
  const main = document.getElementById('admin-main');
  if (!main) return;
  const rect = main.getBoundingClientRect();

  if (window._autoScrollTimer) { clearInterval(window._autoScrollTimer); window._autoScrollTimer = null; }

  if (clientY < rect.top + ZONE) {
    // 위로 스크롤
    window._autoScrollTimer = setInterval(() => { main.scrollTop -= SPEED; }, 16);
  } else if (clientY > rect.bottom - ZONE) {
    // 아래로 스크롤
    window._autoScrollTimer = setInterval(() => { main.scrollTop += SPEED; }, 16);
  }
}

function stopAutoScroll() {
  if (window._autoScrollTimer) { clearInterval(window._autoScrollTimer); window._autoScrollTimer = null; }
}

function sectionDrop(e, bodyEl, targetSi) {
  e.preventDefault();
  stopAutoScroll();
  bodyEl.classList.remove('drag-over-section');
  const card = window._dragCard;
  if (!card) return;
  card.classList.remove('dragging');

  const srcBody = card.closest('.section-block-body');
  if (!srcBody || srcBody === bodyEl) { window._dragCard = null; return; }

  const srcSiMatch = srcBody.id.match(/^sec-(\d+)-list$/);
  if (!srcSiMatch) { window._dragCard = null; return; }

  const artData = collectArticleFromCard(card, false);
  const targetCards = bodyEl.querySelectorAll('.article-card');
  const newAi = targetCards.length;
  bodyEl.insertAdjacentHTML('beforeend', articleCard(artData, 'sec', newAi, false, targetSi));

  card.remove();
  renderPoolArticles();
  toast('기사를 이동했습니다.');
  window._dragCard = null;
}

function addTag(e, input) {
  if (e.key==='Enter' && input.value.trim()) {
    e.preventDefault();
    const chip = document.createElement('span');
    chip.className='tag-chip';
    chip.innerHTML=`${input.value.trim()}<button onclick="removeTag(this)">✕</button>`;
    input.before(chip); input.value='';
  }
}
function removeTag(btn) { btn.parentElement.remove(); }
function addPoint(btn, type, idx, secIdx) {
  const container=btn.previousElementSibling;
  const row=document.createElement('div'); row.className='point-row';
  row.innerHTML=`<input type="text" placeholder="핵심 포인트"><button class="btn-sm delete" onclick="removePoint(this)">✕</button>`;
  container.appendChild(row);
}
function removePoint(btn) { btn.parentElement.remove(); }

window._top5Selected=[]; window._dragSrcIdx=null;

function renderTop5Panel() { renderPoolArticles(); renderTop5Selected(); }

function renderPoolArticles() {
  const poolEl=document.getElementById('pool-articles-list');
  const countEl=document.getElementById('pool-count');
  if (!poolEl) return;
  const sections=window._editingEdition.sections||[];
  const selectedKeys=window._top5Selected.map(s=>`${s._secIdx}-${s._artIdx}`);
  let html='', total=0;
  sections.forEach((sec,si) => {
    const arts=sec.articles||[];
    if (!arts.length) return;
    html+=`<div class="pool-section-group"><div class="pool-section-name">§ ${sec.title}</div>`;
    arts.forEach((a,ai) => {
      total++;
      const key=`${si}-${ai}`, inTop5=selectedKeys.includes(key);
      html+=`<div class="pool-article-item ${inTop5?'in-top5':''}" data-si="${si}" data-ai="${ai}">
        <div class="pool-article-text">${a.title||'(제목 없음)'}</div>
        <div class="pool-article-meta">${a.date||''}</div>
        ${inTop5?`<span style="font-size:10px;color:var(--accent-green);padding:3px 8px;">✓ 선정됨</span>`
                :`<button class="pool-add-btn" onclick="addToTop5(${si},${ai})">+ Top5</button>`}
      </div>`;
    });
    html+=`</div>`;
  });
  if (!total) { html=`<div style="text-align:center;padding:24px;color:var(--ink-light);font-size:12px;">섹션에 기사를 먼저 추가하세요</div>`; countEl.textContent='섹션 기사 없음'; }
  else { countEl.textContent=`${total}개 기사`; }
  poolEl.innerHTML=html;
}

function renderTop5Selected() {
  const el=document.getElementById('top5-selected-list');
  const countEl=document.getElementById('top5-count');
  if (!el) return;
  countEl.textContent=`${window._top5Selected.length} / 5`;
  if (!window._top5Selected.length) { el.innerHTML=`<div class="top5-empty-msg">왼쪽에서 기사를 선택하세요</div>`; return; }
  let html='';
  window._top5Selected.forEach((item,i)=>{
    const sec=(window._editingEdition.sections||[])[item._secIdx];
    const secName=sec?sec.title:'섹션';
    const badgeLabel=item.badge?item.badge.label||'':'';
    const badgeType=item.badge?item.badge.type||'hot':'hot';
    html+=`<div class="top5-selected-item" draggable="true"
      ondragstart="dragStart(event,${i})" ondragover="dragOver(event,${i})"
      ondrop="dragDrop(event,${i})" ondragleave="dragLeave(event)" ondragend="dragEnd(event)">
      <div class="top5-rank-num">${String(i+1).padStart(2,'0')}</div>
      <div class="top5-selected-body">
        <div class="top5-selected-title">${item.title||'(제목 없음)'}</div>
        <div class="top5-selected-sec">${secName} · ${item.date||''}</div>
      </div>
      <div class="top5-selected-badge">
        <input class="top5-badge-input" type="text" placeholder="뱃지 (HOT 등)" value="${badgeLabel}" onchange="updateTop5Badge(${i},'label',this.value)">
        <select class="top5-badge-select" onchange="updateTop5Badge(${i},'type',this.value)">
          <option value="hot" ${badgeType==='hot'?'selected':''}>🔴 hot</option>
          <option value="new" ${badgeType==='new'?'selected':''}>🟢 new</option>
          <option value="trend" ${badgeType==='trend'?'selected':''}>🔵 trend</option>
        </select>
        <button class="top5-remove-btn" onclick="removeFromTop5(${i})">✕ 해제</button>
      </div>
    </div>`;
  });
  el.innerHTML=html;
}

function addToTop5(si,ai) {
  if (window._top5Selected.length>=5){toast('Top5는 최대 5개까지 선정할 수 있습니다.');return;}
  const sec=(window._editingEdition.sections||[])[si]; if(!sec)return;
  const art=(sec.articles||[])[ai]; if(!art)return;
  window._top5Selected.push({...art,_secIdx:si,_artIdx:ai,badge:null});
  renderTop5Panel(); toast(`"${art.title||'기사'}"가 Top5에 추가되었습니다.`);
}
function removeFromTop5(rank){window._top5Selected.splice(rank,1);renderTop5Panel();}
function updateTop5Badge(rank,field,val){const item=window._top5Selected[rank];if(!item.badge)item.badge={label:'',type:'hot'};item.badge[field]=val;}

function dragStart(e,idx){window._dragSrcIdx=idx;e.dataTransfer.effectAllowed='move';e.currentTarget.style.opacity='0.5';}
function dragOver(e,idx){e.preventDefault();e.dataTransfer.dropEffect='move';e.currentTarget.classList.add('drag-over');}
function dragLeave(e){e.currentTarget.classList.remove('drag-over');}
function dragDrop(e,idx){e.preventDefault();e.currentTarget.classList.remove('drag-over');const src=window._dragSrcIdx;if(src===null||src===idx)return;const moved=window._top5Selected.splice(src,1)[0];window._top5Selected.splice(idx,0,moved);renderTop5Selected();}
function dragEnd(e){e.currentTarget.style.opacity='';document.querySelectorAll('.top5-selected-item').forEach(el=>el.classList.remove('drag-over'));window._dragSrcIdx=null;}

function saveAll() {
  syncSectionsFromDom();
  const edition={
    title:document.getElementById('f-title').value,
    date:document.getElementById('f-date').value,
    intro_title:document.getElementById('f-intro-title').value,
    intro:document.getElementById('f-intro').value,
    top5:[],editors_pick:null,sections:[]
  };
  (window._top5Selected||[]).forEach(item=>{
    const secIdx=item._secIdx,artIdx=item._artIdx;
    const secBlock=document.querySelector(`[id="sec-${secIdx}-list"]`);
    let artData={...item};
    if(secBlock){const cards=secBlock.querySelectorAll('.article-card');const card=cards[artIdx];if(card)artData={...artData,...collectArticleFromCard(card,false)};}
    const top5Entry={title:artData.title||'',date:artData.date||'',category:artData.category||'',source:artData.source||'',sub:artData.sub||'',summary:artData.summary||'',url:artData.url||'',points:artData.points||[]};
    if(item.badge&&item.badge.label)top5Entry.badge=item.badge;
    edition.top5.push(top5Entry);
  });
  const epTitle=document.getElementById('ep-title').value;
  if(epTitle){edition.editors_pick={title:epTitle,source:document.getElementById('ep-source').value,summary:document.getElementById('ep-summary').value,url:document.getElementById('ep-url').value,date:document.getElementById('ep-date').value};}
  document.querySelectorAll('.section-block').forEach((block)=>{
    const titleInput=block.querySelector('[id^="sec-title-"]');
    if(!titleInput)return;
    const articles=[];
    block.querySelectorAll('.article-card').forEach(card=>{articles.push(collectArticleFromCard(card,false));});
    edition.sections.push({title:titleInput.value,articles});
  });
  // Firebase key는 항상 _currentKey 유지 (날짜 변경해도 key는 안 바뀜)
  const key = _currentKey;
  if(!key){toast('에디션을 먼저 선택해주세요.');return;}
  _set(_ref(_db,`editions/${key}`),edition)
    .then(()=>{
      toast('✓ 저장되어 발행되었습니다!');
      // 사이드바 날짜 표시 즉시 갱신
      if(window._data[key]) window._data[key] = edition;
      renderSidebar();
    })
    .catch(err=>toast('저장 실패: '+err.message));
}

function collectArticleFromCard(card,isTop5){
  const a={title:card.querySelector('.art-title')?.value||'',date:card.querySelector('.art-date')?.value||'',category:card.querySelector('.art-cat')?.value||'',source:card.querySelector('.art-source')?.value||'',sub:card.querySelector('.art-sub')?.value||'',summary:card.querySelector('.art-summary')?.value||'',url:card.querySelector('.art-url')?.value||'',points:[]};
  card.querySelectorAll('.points-list .point-row input').forEach(inp=>{if(inp.value.trim())a.points.push(inp.value.trim());});
  if(isTop5){const label=card.querySelector('.art-badge-label')?.value;const type=card.querySelector('.art-badge-type')?.value;if(label)a.badge={label,type};}
  else{a.tags=[];card.querySelectorAll('.tag-chip').forEach(chip=>{a.tags.push(chip.textContent.replace('✕','').trim());});}
  return a;
}

function showJsonUpload(){document.getElementById('json-modal').style.display='flex';document.getElementById('json-input').value='';document.getElementById('json-error').style.display='none';setTimeout(()=>document.getElementById('json-input').focus(),100);}
function closeJsonUpload(){document.getElementById('json-modal').style.display='none';}

function uploadJson(){
  const raw=document.getElementById('json-input').value.trim();
  const errEl=document.getElementById('json-error');
  errEl.style.display='none';
  if(!raw){errEl.textContent='JSON을 입력해주세요.';errEl.style.display='block';return;}
  let parsed;
  try{parsed=JSON.parse(raw);}catch(e){errEl.textContent='JSON 형식이 올바르지 않습니다: '+e.message;errEl.style.display='block';return;}
  const editions=parsed.editions||parsed;
  if(typeof editions!=='object'){errEl.textContent='editions 키를 찾을 수 없습니다.';errEl.style.display='block';return;}
  const keys=Object.keys(editions);
  if(!keys.length){errEl.textContent='추가할 에디션이 없습니다.';errEl.style.display='block';return;}
  Promise.all(keys.map(k=>_set(_ref(_db,`editions/${k}`),editions[k])))
    .then(()=>{closeJsonUpload();toast(`✓ ${keys.length}개 에디션이 추가되었습니다: ${keys.join(', ')}`);})
    .catch(err=>{errEl.textContent='업로드 실패: '+err.message;errEl.style.display='block';});
}

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeJsonViewer();closeJsonUpload();}});
</script>
