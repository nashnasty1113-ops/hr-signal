<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR 시그널 관리자</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #F5F0E8;
    --cream-dark: #EDE7D9;
    --cream-border: #D8D0C0;
    --ink: #2A2218;
    --ink-mid: #5A5040;
    --ink-light: #8A7F6A;
    --accent-red: #C94A2A;
    --accent-green: #3A7A5A;
    --accent-blue: #2A5A8A;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--cream);
    color: var(--ink);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    min-height: 100vh;
  }

  .admin-header {
    background: var(--ink);
    color: var(--cream);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .admin-logo {
    font-family: 'Noto Serif KR', serif;
    font-size: 17px;
    font-weight: 700;
  }

  .admin-logo span { color: #E07A3A; }

  .header-actions { display: flex; gap: 8px; }

  .btn {
    padding: 7px 16px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
    font-family: 'Noto Sans KR', sans-serif;
    border: none;
    transition: opacity 0.15s;
  }

  .btn:hover { opacity: 0.85; }

  .btn-outline {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.3);
    color: var(--cream);
  }

  .btn-white {
    background: var(--cream);
    color: var(--ink);
  }

  .btn-danger {
    background: var(--accent-red);
    color: white;
  }

  .btn-success {
    background: var(--accent-green);
    color: white;
  }

  /* ─── LAYOUT ─── */
  .admin-layout {
    display: flex;
    min-height: calc(100vh - 56px);
  }

  /* ─── SIDEBAR ─── */
  .sidebar {
    width: 260px;
    border-right: 1px solid var(--cream-border);
    padding: 20px 0;
    background: var(--cream);
    flex-shrink: 0;
  }

  .sidebar-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--ink-light);
    padding: 0 18px 8px;
  }

  .edition-item {
    padding: 10px 18px;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: all 0.15s;
  }

  .edition-item:hover { background: var(--cream-dark); }

  .edition-item.active {
    border-left-color: var(--accent-red);
    background: var(--cream-dark);
  }

  .edition-item-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--ink);
  }

  .edition-item-date {
    font-size: 11px;
    color: var(--ink-light);
    margin-top: 2px;
  }

  .add-edition-btn {
    margin: 12px 18px 0;
    width: calc(100% - 36px);
    padding: 9px;
    border: 1px dashed var(--cream-border);
    border-radius: 4px;
    background: none;
    cursor: pointer;
    font-size: 12px;
    color: var(--ink-light);
    font-family: 'Noto Sans KR', sans-serif;
    text-align: center;
    transition: all 0.15s;
  }

  .add-edition-btn:hover {
    border-color: var(--ink-mid);
    color: var(--ink);
  }

  /* ─── MAIN PANEL ─── */
  .admin-main {
    flex: 1;
    padding: 28px 36px;
    overflow-y: auto;
  }

  .section-block {
    margin-bottom: 32px;
    background: white;
    border: 1px solid var(--cream-border);
    border-radius: 6px;
    overflow: hidden;
  }

  .section-block-header {
    padding: 14px 20px;
    background: var(--cream-dark);
    border-bottom: 1px solid var(--cream-border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .section-block-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--ink);
  }

  .section-block-body { padding: 16px 20px; }

  /* ─── FORM FIELDS ─── */
  .form-row {
    display: flex;
    gap: 12px;
    margin-bottom: 12px;
  }

  .form-group {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  label {
    font-size: 11px;
    color: var(--ink-light);
    letter-spacing: 0.5px;
  }

  input[type="text"],
  input[type="date"],
  input[type="url"],
  select,
  textarea {
    padding: 8px 10px;
    border: 1px solid var(--cream-border);
    border-radius: 4px;
    font-size: 13px;
    font-family: 'Noto Sans KR', sans-serif;
    background: white;
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
  }

  input:focus, textarea:focus, select:focus {
    border-color: var(--ink-mid);
  }

  textarea { resize: vertical; min-height: 70px; }

  /* ─── ARTICLE CARD ─── */
  .article-card {
    border: 1px solid var(--cream-border);
    border-radius: 5px;
    margin-bottom: 10px;
    overflow: hidden;
  }

  .article-card-header {
    padding: 10px 14px;
    background: var(--cream);
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    user-select: none;
  }

  .article-card-header:hover { background: var(--cream-dark); }

  .article-card-num {
    font-size: 11px;
    font-weight: 500;
    color: var(--ink-mid);
    margin-right: 10px;
  }

  .article-card-title-preview {
    flex: 1;
    font-size: 12px;
    color: var(--ink);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .article-card-actions { display: flex; gap: 6px; }

  .btn-sm {
    padding: 4px 10px;
    font-size: 11px;
    border-radius: 3px;
    cursor: pointer;
    border: 1px solid var(--cream-border);
    background: white;
    color: var(--ink-mid);
    font-family: 'Noto Sans KR', sans-serif;
    transition: background 0.15s;
  }

  .btn-sm:hover { background: var(--cream-dark); }
  .btn-sm.delete { border-color: #FACCCC; color: var(--accent-red); }
  .btn-sm.delete:hover { background: #FEF0F0; }

  .article-card-body {
    padding: 14px 14px;
    border-top: 1px solid var(--cream-border);
    display: none;
  }

  .article-card-body.open { display: block; }

  /* ─── TAGS INPUT ─── */
  .tags-input-wrap {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    padding: 6px 8px;
    border: 1px solid var(--cream-border);
    border-radius: 4px;
    background: white;
    cursor: text;
    min-height: 36px;
    align-items: center;
  }

  .tag-chip {
    background: var(--cream-dark);
    border: 1px solid var(--cream-border);
    border-radius: 10px;
    padding: 2px 8px;
    font-size: 11px;
    color: var(--ink-mid);
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .tag-chip button {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--ink-light);
    font-size: 11px;
    padding: 0;
    line-height: 1;
  }

  .tags-input {
    border: none !important;
    outline: none;
    font-size: 12px;
    font-family: 'Noto Sans KR', sans-serif;
    min-width: 80px;
    flex: 1;
    padding: 0 !important;
    background: transparent;
  }

  /* ─── TOAST ─── */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--ink);
    color: var(--cream);
    padding: 12px 20px;
    border-radius: 6px;
    font-size: 13px;
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.3s;
    z-index: 999;
  }

  .toast.show {
    transform: translateY(0);
    opacity: 1;
  }

  /* ─── POINTS ─── */
  .point-row {
    display: flex;
    gap: 8px;
    margin-bottom: 6px;
    align-items: center;
  }

  .point-row input { flex: 1; }

  .btn-add-row {
    padding: 6px 12px;
    border: 1px dashed var(--cream-border);
    border-radius: 4px;
    background: none;
    cursor: pointer;
    font-size: 11px;
    color: var(--ink-light);
    font-family: 'Noto Sans KR', sans-serif;
    margin-top: 4px;
  }

  .btn-add-row:hover { border-color: var(--ink-mid); color: var(--ink); }

  /* ─── EMPTY ─── */
  .empty-state {
    text-align: center;
    padding: 48px 0;
    color: var(--ink-light);
  }

  .empty-state h3 {
    font-size: 16px;
    margin-bottom: 8px;
    color: var(--ink-mid);
  }

  /* ─── TOP5 PANEL ─── */
  .top5-panel {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    min-height: 320px;
  }

  .top5-pool {
    border-right: 1px solid var(--cream-border);
    padding: 16px;
    max-height: 520px;
    overflow-y: auto;
  }

  .top5-selected {
    padding: 16px;
    max-height: 520px;
    overflow-y: auto;
  }

  .top5-panel-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--ink-light);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .top5-panel-label strong {
    font-size: 12px;
    color: var(--ink-mid);
    letter-spacing: 0;
    font-weight: 500;
  }

  .pool-section-group {
    margin-bottom: 14px;
  }

  .pool-section-name {
    font-size: 10px;
    letter-spacing: 1px;
    color: var(--ink-light);
    padding: 4px 0;
    border-bottom: 1px solid var(--cream-border);
    margin-bottom: 6px;
  }

  .pool-article-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 10px;
    border-radius: 4px;
    border: 1px solid transparent;
    margin-bottom: 4px;
    cursor: pointer;
    transition: all 0.13s;
    background: white;
  }

  .pool-article-item:hover {
    border-color: var(--cream-border);
    background: var(--cream-dark);
  }

  .pool-article-item.in-top5 {
    opacity: 0.45;
    cursor: default;
  }

  .pool-article-item.in-top5:hover {
    background: white;
    border-color: transparent;
  }

  .pool-article-text {
    flex: 1;
    font-size: 12px;
    line-height: 1.4;
    color: var(--ink);
    word-break: keep-all;
  }

  .pool-article-meta {
    font-size: 10px;
    color: var(--ink-light);
    white-space: nowrap;
  }

  .pool-add-btn {
    background: var(--accent-green);
    color: white;
    border: none;
    border-radius: 3px;
    padding: 3px 8px;
    font-size: 11px;
    cursor: pointer;
    white-space: nowrap;
    font-family: 'Noto Sans KR', sans-serif;
    flex-shrink: 0;
  }

  .pool-add-btn:hover { opacity: 0.85; }

  .top5-selected-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 12px;
    border: 1px solid var(--cream-border);
    border-radius: 5px;
    margin-bottom: 8px;
    background: white;
    cursor: grab;
  }

  .top5-selected-item:active { cursor: grabbing; }
  .top5-selected-item.drag-over { border-color: var(--accent-red); background: #FEF0F0; }

  .top5-rank-num {
    font-size: 22px;
    font-weight: 700;
    color: var(--accent-red);
    line-height: 1;
    min-width: 28px;
    padding-top: 2px;
  }

  .top5-selected-item:nth-child(2) .top5-rank-num { color: var(--ink-mid); }
  .top5-selected-item:nth-child(n+3) .top5-rank-num { color: var(--cream-border); }

  .top5-selected-body { flex: 1; }

  .top5-selected-title {
    font-size: 12px;
    font-weight: 500;
    line-height: 1.4;
    color: var(--ink);
    word-break: keep-all;
    margin-bottom: 4px;
  }

  .top5-selected-sec {
    font-size: 10px;
    color: var(--ink-light);
  }

  .top5-selected-badge {
    display: flex;
    flex-direction: column;
    gap: 4px;
    align-items: flex-end;
    flex-shrink: 0;
  }

  .top5-badge-input {
    font-size: 11px;
    padding: 3px 7px;
    border: 1px solid var(--cream-border);
    border-radius: 3px;
    background: white;
    width: 80px;
    font-family: 'Noto Sans KR', sans-serif;
  }

  .top5-badge-select {
    font-size: 11px;
    padding: 3px 6px;
    border: 1px solid var(--cream-border);
    border-radius: 3px;
    background: white;
    width: 80px;
    font-family: 'Noto Sans KR', sans-serif;
  }

  .top5-remove-btn {
    background: none;
    border: 1px solid #FACCCC;
    color: var(--accent-red);
    border-radius: 3px;
    padding: 3px 7px;
    font-size: 11px;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
  }

  .top5-remove-btn:hover { background: #FEF0F0; }

  .top5-empty-msg {
    text-align: center;
    padding: 32px 16px;
    color: var(--ink-light);
    font-size: 12px;
    border: 1px dashed var(--cream-border);
    border-radius: 5px;
  }

  .top5-drag-hint {
    font-size: 10px;
    color: var(--ink-light);
    text-align: center;
    margin-top: 8px;
    letter-spacing: 0.5px;
  }

  /* ─── EDITION FORM ─── */
  .edition-form-block {
    background: white;
    border: 1px solid var(--cream-border);
    border-radius: 6px;
    padding: 20px;
    margin-bottom: 24px;
  }

  .edition-form-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--ink);
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--cream-border);
  }
</style>
</head>
<body>

<header class="admin-header">
  <div class="admin-logo">HR<span>시그널</span> 관리자</div>
  <div class="header-actions">
    <a href="index.html" class="btn btn-outline">← 뉴스레터 보기</a>
    <button class="btn btn-white" onclick="saveAll()">저장 & 발행</button>
  </div>
</header>

<div class="admin-layout">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-label">에디션 목록</div>
    <div id="edition-list"></div>
    <button class="add-edition-btn" onclick="createNewEdition()">+ 새 에디션 추가</button>
    <button class="add-edition-btn" onclick="showJsonUpload()" style="margin-top:6px;border-color:#C94A2A;color:#C94A2A;">↑ JSON으로 업로드</button>
  </aside>

  <!-- MAIN -->
  <main class="admin-main" id="admin-main">
    <div class="empty-state">
      <h3>에디션을 선택하거나 새로 만드세요</h3>
      <p>왼쪽 사이드바에서 에디션을 선택하면 편집할 수 있습니다.</p>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<!-- JSON 업로드 모달 -->
<div style="display:none;position:fixed;inset:0;background:rgba(42,34,24,0.55);z-index:300;align-items:center;justify-content:center;" id="json-modal">
  <div style="background:#F5F0E8;border-radius:8px;padding:28px;width:560px;max-width:95vw;border:1px solid #D8D0C0;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
      <div>
        <div style="font-family:'Noto Serif KR',serif;font-size:16px;font-weight:700;color:#2A2218;">JSON으로 에디션 추가</div>
        <div style="font-size:12px;color:#8A7F6A;margin-top:3px;">기존 에디션은 유지되고 새 에디션만 추가됩니다.</div>
      </div>
      <button onclick="closeJsonUpload()" style="background:none;border:1px solid #D8D0C0;border-radius:50%;width:28px;height:28px;cursor:pointer;font-size:14px;color:#5A5040;">✕</button>
    </div>
    <textarea id="json-input" placeholder='제가 드린 JSON을 여기에 붙여넣으세요.

{
  "editions": {
    "2026-04-21": { ... }
  }
}'
      style="width:100%;height:220px;padding:12px;border:1px solid #D8D0C0;border-radius:4px;font-size:12px;font-family:monospace;background:white;color:#2A2218;resize:vertical;outline:none;"></textarea>
    <div id="json-error" style="font-size:12px;color:#C94A2A;margin-top:6px;display:none;"></div>
    <div style="display:flex;gap:8px;margin-top:12px;">
      <button onclick="closeJsonUpload()" style="padding:10px 16px;border:1px solid #D8D0C0;border-radius:4px;background:none;cursor:pointer;font-size:13px;color:#5A5040;font-family:'Noto Sans KR',sans-serif;">취소</button>
      <button onclick="uploadJson()" style="flex:1;padding:10px;background:#2A2218;color:#F5F0E8;border:none;border-radius:4px;cursor:pointer;font-size:13px;font-family:'Noto Sans KR',sans-serif;">업로드</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, onValue, set, remove } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

// ★ 동일한 Firebase 설정
const firebaseConfig = {
  apiKey: "AIzaSyBIH03tDDCNSZHdq0_ru-4LnvaehECycSY",
  authDomain: "hrsignal.firebaseapp.com",
  databaseURL: "https://hrsignal-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "hrsignal",
  storageBucket: "hrsignal.firebasestorage.app",
  messagingSenderId: "978655131936",
  appId: "1:978655131936:web:74ed0e629baa74e8f93f45"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window._db = db;
window._ref = ref;
window._set = set;
window._remove = remove;

// 데이터 로드
const editionsRef = ref(db, 'editions');
onValue(editionsRef, (snapshot) => {
  window._data = snapshot.val() || {};
  window._keys = Object.keys(window._data).sort().reverse();
  renderSidebar();
});
</script>

<script>
window._data = {};
window._keys = [];
window._currentKey = null;

// ─── SIDEBAR ───
function renderSidebar() {
  const list = document.getElementById('edition-list');
  list.innerHTML = '';
  _keys.forEach(k => {
    const ed = _data[k];
    const item = document.createElement('div');
    item.className = 'edition-item' + (k === _currentKey ? ' active' : '');
    item.style.cssText = 'display:flex;align-items:center;justify-content:space-between;';
    item.innerHTML = `
      <div onclick="selectEditionByKey('${k}')" style="flex:1;cursor:pointer;">
        <div class="edition-item-title">${ed.title || k}</div>
        <div class="edition-item-date">${ed.date || ''}</div>
      </div>
      <button onclick="deleteEdition('${k}')" title="에디션 삭제"
        style="background:none;border:none;cursor:pointer;color:#8A7F6A;font-size:14px;
        padding:4px 6px;border-radius:3px;flex-shrink:0;line-height:1;"
        onmouseover="this.style.color='#C94A2A';this.style.background='#FDEEE9'"
        onmouseout="this.style.color='#8A7F6A';this.style.background='none'">✕</button>`;
    list.appendChild(item);
  });
}

function selectEditionByKey(key) {
  _currentKey = key;
  document.querySelectorAll('.edition-item').forEach(el => el.classList.remove('active'));
  const items = document.querySelectorAll('.edition-item');
  items.forEach(el => {
    if (el.querySelector(`[onclick="selectEditionByKey('${key}')"]`)) el.classList.add('active');
  });
  renderEditor(_data[key]);
}

function deleteEdition(key) {
  const title = _data[key]?.title || key;
  if (!confirm(`"${title}" 에디션을 삭제할까요?\n\n이 작업은 되돌릴 수 없습니다.`)) return;
  _remove(_ref(_db, `editions/${key}`)).then(() => {
    toast(`"${title}" 에디션이 삭제되었습니다.`);
    if (_currentKey === key) {
      _currentKey = null;
      document.getElementById('admin-main').innerHTML = `
        <div class="empty-state">
          <h3>에디션을 선택하거나 새로 만드세요</h3>
          <p>왼쪽 사이드바에서 에디션을 선택하면 편집할 수 있습니다.</p>
        </div>`;
    }
  }).catch(err => toast('삭제 실패: ' + err.message));
}

// ─── SELECT EDITION ───
function selectEdition(key) {
  selectEditionByKey(key);
}

// ─── CREATE NEW EDITION ───
function createNewEdition() {
  const now = new Date();
  const key = now.toISOString().split('T')[0];
  const newEd = {
    title: `HR시그널 #${(_keys.length + 1)}`,
    date: key,
    intro_title: '이번 주 HR 핵심 이슈',
    intro: '',
    top5: [],
    editors_pick: null,

// ─── CARD TOGGLE ───
function toggleCard(header) {
  const body = header.nextElementSibling;
  body.classList.toggle('open');
  // 제목 미리보기 업데이트
  const input = body.querySelector('.art-title');
  if (input) {
    header.querySelector('.article-card-title-preview').textContent = input.value || '(제목 없음)';
  }
}

// ─── ADD ARTICLE ───
function addArticle(type, secIdx) {
  const blank = { title: '', date: '', category: '', source: '', summary: '', sub: '', points: [], tags: [], url: '' };
  if (type === 'top5') {
    if (!window._editingEdition.top5) window._editingEdition.top5 = [];
    const idx = window._editingEdition.top5.length;
    window._editingEdition.top5.push(blank);
    const html = articleCard(blank, 'top5', idx, true);
    document.getElementById('top5-list').insertAdjacentHTML('beforeend', html);
  } else {
    const sec = window._editingEdition.sections[secIdx];
    if (!sec.articles) sec.articles = [];
    const idx = sec.articles.length;
    sec.articles.push(blank);
    const html = articleCard(blank, 'sec', idx, false, secIdx);
    document.getElementById(`sec-${secIdx}-list`).insertAdjacentHTML('beforeend', html);
    renderPoolArticles();
  }
}

// ─── DELETE ARTICLE ───
function deleteArticle(e, type, idx, secIdx) {
  e.stopPropagation();
  if (!confirm('이 기사를 삭제할까요?')) return;
  const card = e.target.closest('.article-card');
  // Top5에서도 해당 기사 제거
  if (type === 'sec') {
    window._top5Selected = (window._top5Selected || []).filter(
      s => !(s._secIdx == secIdx && s._artIdx == idx)
    );
    renderTop5Panel();
  }
  card.remove();
  toast('기사가 삭제되었습니다.');
}

// ─── DELETE SECTION ───
function deleteSection(si) {

  toast('섹션이 삭제되었습니다.');
}

// ─── TAGS ───
function addTag(e, input) {
  if (e.key === 'Enter' && input.value.trim()) {
    e.preventDefault();
    const chip = document.createElement('span');
    chip.className = 'tag-chip';
    chip.innerHTML = `${input.value.trim()}<button onclick="removeTag(this)">✕</button>`;
    input.before(chip);
    input.value = '';
  }
}

function removeTag(btn) {
  btn.parentElement.remove();
}

// ─── POINTS ───
function addPoint(btn, type, idx, secIdx) {
  const container = btn.previousElementSibling;
  const pi = container.children.length;
  const row = document.createElement('div');
  row.className = 'point-row';
  row.innerHTML = `<input type="text" placeholder="핵심 포인트">
    <button class="btn-sm delete" onclick="removePoint(this)">✕</button>`;
  container.appendChild(row);
}

function removePoint(btn) {
  btn.parentElement.remove();
}

// ─── TOP5 PANEL ───
window._top5Selected = []; // { title, date, category, source, sub, summary, url, points, tags, badge, _secIdx, _artIdx }
window._dragSrcIdx = null;

function renderTop5Panel() {
  renderPoolArticles();
  renderTop5Selected();
}

function renderPoolArticles() {
  const poolEl = document.getElementById('pool-articles-list');
  const countEl = document.getElementById('pool-count');
  if (!poolEl) return;

  const sections = window._editingEdition.sections || [];
  // 현재 top5에 선정된 기사 식별자 목록
  const selectedKeys = window._top5Selected.map(s => `${s._secIdx}-${s._artIdx}`);

  let html = '';
  let total = 0;

  sections.forEach((sec, si) => {
    const arts = sec.articles || [];
    if (!arts.length) return;
    html += `<div class="pool-section-group">
      <div class="pool-section-name">§ ${sec.title}</div>`;
    arts.forEach((a, ai) => {
      total++;
      const key = `${si}-${ai}`;
      const inTop5 = selectedKeys.includes(key);
      html += `<div class="pool-article-item ${inTop5 ? 'in-top5' : ''}" data-si="${si}" data-ai="${ai}">
        <div class="pool-article-text">${a.title || '(제목 없음)'}</div>
        <div class="pool-article-meta">${a.date || ''}</div>
        ${inTop5
          ? `<span style="font-size:10px;color:var(--accent-green);padding:3px 8px;">✓ 선정됨</span>`
          : `<button class="pool-add-btn" onclick="addToTop5(${si},${ai})">+ Top5</button>`}
      </div>`;
    });
    html += `</div>`;
  });

  if (!total) {
    html = `<div style="text-align:center;padding:24px;color:var(--ink-light);font-size:12px;">
      섹션에 기사를 먼저 추가하세요
    </div>`;
    countEl.textContent = '섹션 기사 없음';
  } else {
    countEl.textContent = `${total}개 기사`;
  }

  poolEl.innerHTML = html;
}

function renderTop5Selected() {
  const el = document.getElementById('top5-selected-list');
  const countEl = document.getElementById('top5-count');
  if (!el) return;

  countEl.textContent = `${window._top5Selected.length} / 5`;

  if (!window._top5Selected.length) {
    el.innerHTML = `<div class="top5-empty-msg">왼쪽에서 기사를 선택하세요</div>`;
    return;
  }

  let html = '';
  window._top5Selected.forEach((item, i) => {
    const sec = (window._editingEdition.sections || [])[item._secIdx];
    const secName = sec ? sec.title : '섹션';
    const badgeLabel = item.badge ? item.badge.label || '' : '';
    const badgeType = item.badge ? item.badge.type || 'hot' : 'hot';
    html += `<div class="top5-selected-item" draggable="true"
        ondragstart="dragStart(event,${i})"
        ondragover="dragOver(event,${i})"
        ondrop="dragDrop(event,${i})"
        ondragleave="dragLeave(event)"
        ondragend="dragEnd(event)">
      <div class="top5-rank-num">${String(i+1).padStart(2,'0')}</div>
      <div class="top5-selected-body">
        <div class="top5-selected-title">${item.title || '(제목 없음)'}</div>
        <div class="top5-selected-sec">${secName} · ${item.date || ''}</div>
      </div>
      <div class="top5-selected-badge">
        <input class="top5-badge-input" type="text" placeholder="뱃지 (HOT 등)"
          value="${badgeLabel}"
          onchange="updateTop5Badge(${i},'label',this.value)">
        <select class="top5-badge-select" onchange="updateTop5Badge(${i},'type',this.value)">
          <option value="hot" ${badgeType==='hot'?'selected':''}>🔴 hot</option>
          <option value="new" ${badgeType==='new'?'selected':''}>🟢 new</option>
          <option value="trend" ${badgeType==='trend'?'selected':''}>🔵 trend</option>
        </select>
        <button class="top5-remove-btn" onclick="removeFromTop5(${i})">✕ 해제</button>
      </div>
    </div>`;
  });

  el.innerHTML = html;
}

function addToTop5(si, ai) {
  if (window._top5Selected.length >= 5) {
    toast('Top5는 최대 5개까지 선정할 수 있습니다.'); return;
  }
  const sec = (window._editingEdition.sections || [])[si];
  if (!sec) return;
  const art = (sec.articles || [])[ai];
  if (!art) return;

  window._top5Selected.push({ ...art, _secIdx: si, _artIdx: ai, badge: null });
  renderTop5Panel();
  toast(`"${art.title || '기사'}"가 Top5에 추가되었습니다.`);
}

function removeFromTop5(rank) {
  window._top5Selected.splice(rank, 1);
  renderTop5Panel();
}

function updateTop5Badge(rank, field, val) {
  const item = window._top5Selected[rank];
  if (!item.badge) item.badge = { label: '', type: 'hot' };
  item.badge[field] = val;
}

// ─── DRAG & DROP (Top5 순서 변경) ───
function dragStart(e, idx) {
  window._dragSrcIdx = idx;
  e.dataTransfer.effectAllowed = 'move';
  e.currentTarget.style.opacity = '0.5';
}

function dragOver(e, idx) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  e.currentTarget.classList.add('drag-over');
}

function dragLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}

function dragDrop(e, idx) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  const src = window._dragSrcIdx;
  if (src === null || src === idx) return;
  const moved = window._top5Selected.splice(src, 1)[0];
  window._top5Selected.splice(idx, 0, moved);
  renderTop5Selected();
}

function dragEnd(e) {
  e.currentTarget.style.opacity = '';
  document.querySelectorAll('.top5-selected-item').forEach(el => el.classList.remove('drag-over'));
  window._dragSrcIdx = null;
}

// ─── SAVE ALL ───
function saveAll() {
  // 기본 정보 수집
  const edition = {
    title: document.getElementById('f-title').value,
    date: document.getElementById('f-date').value,
    intro_title: document.getElementById('f-intro-title').value,
    intro: document.getElementById('f-intro').value,
    top5: [],
    editors_pick: null,
    sections: []
  };

  // TOP 5 — _top5Selected에서 수집 (섹션 기사 데이터 + 뱃지)
  (window._top5Selected || []).forEach(item => {
    const sec = (edition.sections.length ? null : null); // placeholder
    // 섹션 기사 최신값을 DOM에서 읽기
    const secIdx = item._secIdx;
    const artIdx = item._artIdx;
    const secBlock = document.querySelector(`[id="sec-${secIdx}-list"]`);
    let artData = { ...item };
    if (secBlock) {
      const cards = secBlock.querySelectorAll('.article-card');
      const card = cards[artIdx];
      if (card) artData = { ...artData, ...collectArticleFromCard(card, false) };
    }
    const top5Entry = {
      title: artData.title || '',
      date: artData.date || '',
      category: artData.category || '',
      source: artData.source || '',
      sub: artData.sub || '',
      summary: artData.summary || '',
      url: artData.url || '',
      points: artData.points || [],
    };
    if (item.badge && item.badge.label) top5Entry.badge = item.badge;
    edition.top5.push(top5Entry);
  });

  // Editor's Pick
  const epTitle = document.getElementById('ep-title').value;
  if (epTitle) {
    edition.editors_pick = {
      title: epTitle,
      source: document.getElementById('ep-source').value,
      summary: document.getElementById('ep-summary').value,
      url: document.getElementById('ep-url').value,
      date: document.getElementById('ep-date').value,
    };
  }

  // Sections
  document.querySelectorAll('.section-block').forEach((block, si) => {
    const titleInput = block.querySelector('[id^="sec-title-"]');
    if (!titleInput) return;
    const secIdx = titleInput.id.replace('sec-title-', '');
    const articles = [];
    block.querySelectorAll('.article-card').forEach(card => {
      articles.push(collectArticleFromCard(card, false));
    });
    edition.sections.push({
      title: titleInput.value,
      articles
    });
  });

  // Firebase 저장
  const key = edition.date || _currentKey;
  if (!key) { toast('발행일을 입력해주세요.'); return; }

  _set(_ref(_db, `editions/${key}`), edition)
    .then(() => {
      toast('✓ 저장되어 발행되었습니다!');
      _currentKey = key;
    })
    .catch(err => toast('저장 실패: ' + err.message));
}

function collectArticleFromCard(card, isTop5) {
  const a = {
    title: card.querySelector('.art-title')?.value || '',
    date: card.querySelector('.art-date')?.value || '',
    category: card.querySelector('.art-cat')?.value || '',
    source: card.querySelector('.art-source')?.value || '',
    sub: card.querySelector('.art-sub')?.value || '',
    summary: card.querySelector('.art-summary')?.value || '',
    url: card.querySelector('.art-url')?.value || '',
    points: [],
  };

  // Points
  card.querySelectorAll('.points-list .point-row input').forEach(inp => {
    if (inp.value.trim()) a.points.push(inp.value.trim());
  });

  if (isTop5) {
    const label = card.querySelector('.art-badge-label')?.value;
    const type = card.querySelector('.art-badge-type')?.value;
    if (label) a.badge = { label, type };
  } else {
    a.tags = [];
    card.querySelectorAll('.tag-chip').forEach(chip => {
      a.tags.push(chip.textContent.replace('✕','').trim());
    });
  }

  return a;
}

// ─── JSON 업로드 ───
function showJsonUpload() {
  document.getElementById('json-modal').style.display = 'flex';
  document.getElementById('json-input').value = '';
  document.getElementById('json-error').style.display = 'none';
  setTimeout(() => document.getElementById('json-input').focus(), 100);
}

function closeJsonUpload() {
  document.getElementById('json-modal').style.display = 'none';
}

function uploadJson() {
  const raw = document.getElementById('json-input').value.trim();
  const errEl = document.getElementById('json-error');
  errEl.style.display = 'none';

  if (!raw) { errEl.textContent = 'JSON을 입력해주세요.'; errEl.style.display = 'block'; return; }

  let parsed;
  try {
    parsed = JSON.parse(raw);
  } catch(e) {
    errEl.textContent = 'JSON 형식이 올바르지 않습니다: ' + e.message;
    errEl.style.display = 'block';
    return;
  }

  const editions = parsed.editions || parsed;
  if (typeof editions !== 'object') {
    errEl.textContent = 'editions 키를 찾을 수 없습니다.';
    errEl.style.display = 'block';
    return;
  }

  const keys = Object.keys(editions);
  if (keys.length === 0) {
    errEl.textContent = '추가할 에디션이 없습니다.';
    errEl.style.display = 'block';
    return;
  }

  // 각 에디션을 개별적으로 Firebase에 저장 (기존 데이터 유지)
  const promises = keys.map(k => _set(_ref(_db, `editions/${k}`), editions[k]));

  Promise.all(promises)
    .then(() => {
      closeJsonUpload();
      toast(`✓ ${keys.length}개 에디션이 추가되었습니다: ${keys.join(', ')}`);
    })
    .catch(err => {
      errEl.textContent = '업로드 실패: ' + err.message;
      errEl.style.display = 'block';
    });
}

// ─── TOAST ───
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ─── DELETE EDITION ───
function deleteCurrentEdition() {
  if (!_currentKey || !confirm(`'${_data[_currentKey]?.title}' 에디션을 삭제할까요?`)) return;
  _remove(_ref(_db, `editions/${_currentKey}`)).then(() => {
    toast('에디션이 삭제되었습니다.');
    _currentKey = null;
    document.getElementById('admin-main').innerHTML = '<div class="empty-state"><h3>에디션을 선택하세요</h3></div>';
  });
}
