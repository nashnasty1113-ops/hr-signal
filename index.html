<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR 시그널</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;600;700;900&family=Noto+Sans+KR:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,700;0,900;1,700&display=swap" rel="stylesheet">
<style>
:root {
  --navy:        #1A3F7A;
  --navy-dark:   #122D58;
  --navy-mid:    #2A5299;
  --navy-light:  #EEF3FB;
  --accent:      #4A90D9;
  --white:       #FFFFFF;
  --bg:          #F6F8FC;
  --border:      #DDE4F0;
  --ink:         #111827;
  --ink-mid:     #374151;
  --ink-light:   #6B7280;
  --red:         #DC2626;
  --green:       #16A34A;
  --orange:      #EA580C;
  --max-w:       720px;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 14px;
  line-height: 1.7;
}

/* ─── 상단 바 ─── */
.topbar {
  background: var(--navy-dark);
  color: rgba(255,255,255,0.6);
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 9px 28px;
  font-size: 10px;
  letter-spacing: 2px;
}
.topbar-live { display:flex; align-items:center; gap:6px; }
.live-dot {
  width:6px; height:6px; border-radius:50%;
  background:#F87171;
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }
.admin-link {
  font-size:10px; letter-spacing:1px;
  color:rgba(255,255,255,0.4);
  cursor:pointer;
  border-bottom:1px solid rgba(255,255,255,0.15);
  transition:color .15s;
}
.admin-link:hover { color:rgba(255,255,255,0.75); }

/* ─── 헤더 ─── */
.mag-header {
  background: var(--navy);
  padding: 36px 24px 28px;
  text-align: center;
}
.mag-logo {
  font-family: 'Playfair Display', 'Noto Serif KR', serif;
  font-size: clamp(48px,11vw,80px);
  font-weight: 900;
  line-height: 1;
  color: var(--white);
  letter-spacing: -1px;
}
.mag-logo .sig {
  color: #93C5FD;
}
.mag-sub {
  font-size: 10px;
  letter-spacing: 4px;
  color: rgba(255,255,255,0.4);
  margin-top: 8px;
}
.header-rule {
  height: 3px;
  background: linear-gradient(90deg, var(--navy-dark) 0%, var(--accent) 50%, var(--navy-dark) 100%);
}

/* ─── 날짜 / 에디션 바 ─── */
.meta-bar {
  background: var(--white);
  border-bottom: 1px solid var(--border);
  padding: 10px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.meta-date { font-size:12px; color:var(--ink-light); }
.issue-no  { font-size:11px; letter-spacing:2px; color:var(--navy); font-weight:600; }

/* ─── 에디션 셀렉터 ─── */
.edition-selector {
  display:flex; gap:6px; flex-wrap:wrap;
  justify-content:center;
  padding:14px 24px 0;
}
.edition-btn {
  padding:4px 14px;
  border:1px solid var(--border);
  border-radius:20px;
  background:none;
  cursor:pointer;
  font-size:11px;
  color:var(--ink-mid);
  font-family:'Noto Sans KR',sans-serif;
  transition:all .15s;
}
.edition-btn:hover { border-color:var(--navy); color:var(--navy); }
.edition-btn.active { background:var(--navy); color:var(--white); border-color:var(--navy); }

/* ─── 본문 래퍼 ─── */
.wrap {
  max-width: var(--max-w);
  margin: 0 auto;
  padding: 0 20px;
}

/* ─── EDITOR'S NOTE ─── */
.editors-note {
  background: var(--white);
  border-left: 3px solid var(--navy);
  border-radius: 0 6px 6px 0;
  padding: 20px 24px;
  margin: 28px 0 36px;
  display: grid;
  grid-template-columns: 90px 1fr;
  gap: 0 20px;
}
.note-label {
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--navy);
  font-weight: 700;
  padding-top: 2px;
}
.note-body { font-size:13px; color:var(--ink-mid); line-height:1.9; }
.note-sig  { font-size:12px; color:var(--ink-light); margin-top:8px; font-style:italic; }

/* ─── 섹션 헤더 ─── */
.sec-header {
  display:flex; align-items:baseline; justify-content:space-between;
  padding-bottom:9px;
  border-bottom:2px solid var(--navy);
  margin-bottom:4px;
}
.sec-header-left { display:flex; align-items:baseline; gap:10px; }
.sec-symbol { font-size:10px; color:var(--ink-light); letter-spacing:1px; }
.sec-title  { font-family:'Noto Serif KR',serif; font-size:19px; font-weight:700; color:var(--navy); }
.sec-count  { font-size:10px; color:var(--ink-light); letter-spacing:1px; }
.sec-desc   { font-size:11px; color:var(--ink-light); margin:5px 0 18px; font-style:italic; }

/* ─── TOP 5 ─── */
.top5-list { list-style:none; margin-bottom:40px; }
.top5-item {
  display:grid;
  grid-template-columns:48px 1fr auto;
  align-items:start;
  gap:0 14px;
  padding:16px 12px;
  border-bottom:1px solid var(--border);
  cursor:pointer;
  border-radius:4px;
  transition:background .12s;
}
.top5-item:hover  { background:var(--navy-light); }
.top5-item.active { background:var(--navy-light); }

.top5-num {
  font-family:'Playfair Display',serif;
  font-size:32px; font-weight:700;
  color:var(--navy); line-height:1;
  padding-top:3px;
}
.top5-item:nth-child(2) .top5-num { color:var(--ink-light); }
.top5-item:nth-child(3) .top5-num,
.top5-item:nth-child(4) .top5-num,
.top5-item:nth-child(5) .top5-num { color:var(--border); }

.top5-cat-row { display:flex; align-items:center; gap:5px; margin-bottom:3px; }
.top5-cat    { font-size:10px; color:var(--ink-light); }
.top5-dot    { width:3px; height:3px; border-radius:50%; background:var(--border); }
.top5-date-sm{ font-size:10px; color:var(--ink-light); }
.top5-headline { font-size:15px; font-weight:600; line-height:1.5; word-break:keep-all; color:var(--ink); }

.badge {
  font-size:9px; padding:2px 8px; border-radius:10px;
  white-space:nowrap; align-self:flex-start; margin-top:6px;
  display:flex; align-items:center; gap:3px; font-weight:600;
}
.badge::before { content:''; width:5px; height:5px; border-radius:50%; }
.badge-hot   { background:#FEE2E2; color:var(--red); }
.badge-hot::before { background:var(--red); }
.badge-new   { background:#DCFCE7; color:var(--green); }
.badge-new::before { background:var(--green); }
.badge-trend { background:var(--navy-light); color:var(--navy); }
.badge-trend::before { background:var(--navy); }

/* ─── NEWS LIST ─── */
.news-list { list-style:none; margin-bottom:40px; }
.news-item {
  display:flex; gap:14px;
  padding:15px 12px;
  border-bottom:1px solid var(--border);
  cursor:pointer; border-radius:4px;
  transition:background .12s;
}
.news-item:hover  { background:var(--navy-light); }
.news-item.active { background:var(--navy-light); }

.news-body { flex:1; }
.news-tags { display:flex; gap:4px; margin-bottom:5px; flex-wrap:wrap; }
.tag {
  font-size:10px; padding:2px 8px;
  border:1px solid var(--border);
  border-radius:10px;
  color:var(--navy); background:var(--navy-light);
  font-weight:500;
}
.news-headline {
  font-size:14px; font-weight:600;
  line-height:1.55; margin-bottom:4px;
  word-break:keep-all; color:var(--ink);
}
.news-snippet {
  font-size:12px; color:var(--ink-light); line-height:1.65;
  display:-webkit-box; -webkit-line-clamp:2;
  -webkit-box-orient:vertical; overflow:hidden;
}
.news-meta { font-size:10px; color:var(--ink-light); white-space:nowrap; padding-top:2px; text-align:right; min-width:44px; }

/* ─── EDITOR'S PICK ─── */
.pick-block {
  background:var(--navy);
  border-radius:6px;
  padding:22px 26px;
  margin-bottom:40px;
  cursor:pointer;
  transition:opacity .15s;
  position:relative; overflow:hidden;
}
.pick-block::before {
  content:'';
  position:absolute; top:0; left:0;
  width:4px; height:100%;
  background:#93C5FD;
}
.pick-block:hover { opacity:.92; }
.pick-label { font-size:9px; letter-spacing:2px; color:#93C5FD; margin-bottom:8px; font-weight:700; }
.pick-title { font-family:'Noto Serif KR',serif; font-size:17px; font-weight:700; margin-bottom:8px; line-height:1.5; color:var(--white); }
.pick-desc  { font-size:12px; color:rgba(255,255,255,0.65); line-height:1.8; }

/* ─── 푸터 ─── */
.site-footer {
  background:var(--navy-dark);
  padding:18px 28px;
  font-size:11px;
  color:rgba(255,255,255,0.4);
  display:flex; justify-content:space-between;
  margin-top:40px;
}

.loading { text-align:center; padding:80px 0; color:var(--ink-light); }

/* ════ OVERLAY MODAL ════ */
.overlay-backdrop {
  display:none; position:fixed; inset:0;
  background:rgba(17,24,39,0.6);
  backdrop-filter:blur(4px);
  z-index:200; align-items:center; justify-content:center; padding:20px;
}
.overlay-backdrop.show { display:flex; }
.overlay-modal {
  background:var(--white);
  border-radius:8px; width:100%; max-width:580px;
  max-height:88vh; overflow-y:auto;
  animation:slideUp .22s ease;
  border-top:4px solid var(--navy);
  box-shadow:0 20px 60px rgba(17,24,39,0.2);
}
@keyframes slideUp { from{transform:translateY(16px);opacity:0} to{transform:translateY(0);opacity:1} }

.modal-inner { padding:26px 30px 34px; }
.modal-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
.modal-tags { display:flex; gap:6px; flex-wrap:wrap; }
.modal-tag { font-size:10px; padding:3px 10px; border-radius:12px; font-weight:600; }
.modal-tag-cat { background:var(--navy); color:white; }
.modal-tag-sec { background:var(--navy-light); color:var(--navy); border:1px solid var(--border); }

.modal-close {
  width:30px; height:30px;
  border:1px solid var(--border); border-radius:50%;
  background:none; cursor:pointer; font-size:14px;
  color:var(--ink-light);
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0; transition:background .12s;
}
.modal-close:hover { background:var(--navy-light); }

.modal-title { font-family:'Noto Serif KR',serif; font-size:20px; font-weight:700; line-height:1.4; margin-bottom:6px; word-break:keep-all; color:var(--ink); }
.modal-sub   { font-size:12px; color:var(--ink-light); margin-bottom:16px; line-height:1.6; }
.modal-divider { border:none; border-top:1px solid var(--border); margin:12px 0; }
.modal-meta  { display:flex; gap:18px; font-size:12px; color:var(--ink-light); margin-bottom:14px; flex-wrap:wrap; }
.modal-meta strong { color:var(--ink); font-weight:600; }
.modal-summary-label { font-size:9px; letter-spacing:2px; color:var(--navy); margin-bottom:7px; font-weight:700; }
.modal-summary { font-size:13px; color:var(--ink-mid); line-height:1.9; margin-bottom:16px; }

.modal-points { list-style:none; margin-bottom:18px; }
.modal-points li {
  padding:9px 0 9px 16px;
  border-bottom:1px solid var(--border);
  font-size:13px; color:var(--ink-mid); line-height:1.65; position:relative;
}
.modal-points li::before { content:'—'; position:absolute; left:0; color:var(--navy); font-size:10px; top:12px; }

.modal-source { display:flex; align-items:center; justify-content:space-between; font-size:11px; color:var(--ink-light); margin-top:14px; }
.modal-link { color:var(--navy-mid); text-decoration:none; font-size:12px; border-bottom:1px solid currentColor; }
.modal-link:hover { opacity:.7; }

.modal-nav { display:flex; gap:8px; margin-top:18px; }
.modal-nav-btn {
  flex:1; padding:10px;
  border:1px solid var(--border); border-radius:4px;
  background:none; cursor:pointer; font-size:12px; color:var(--ink-mid);
  font-family:'Noto Sans KR',sans-serif; transition:all .12s;
}
.modal-nav-btn:hover { background:var(--navy-light); color:var(--navy); border-color:var(--navy); }
.modal-nav-btn:disabled { opacity:.3; cursor:default; }

/* ─── 관리자 모달 ─── */
.admin-modal-backdrop { display:none; position:fixed; inset:0; background:rgba(17,24,39,0.55); backdrop-filter:blur(3px); z-index:300; align-items:center; justify-content:center; }
.admin-modal-backdrop.show { display:flex; }
.admin-modal { background:var(--white); border-radius:8px; padding:30px 26px; width:320px; border:1px solid var(--border); border-top:4px solid var(--navy); box-shadow:0 10px 40px rgba(17,24,39,0.15); }
.admin-modal h3 { font-family:'Noto Serif KR',serif; font-size:17px; margin-bottom:5px; color:var(--navy); }
.admin-modal p { font-size:12px; color:var(--ink-light); margin-bottom:16px; }
.admin-modal input { width:100%; padding:10px 12px; border:1px solid var(--border); border-radius:4px; background:var(--bg); font-size:13px; font-family:'Noto Sans KR',sans-serif; margin-bottom:10px; outline:none; }
.admin-modal input:focus { border-color:var(--navy); }
.modal-btns { display:flex; gap:8px; }
.btn-primary { flex:1; padding:10px; background:var(--navy); color:var(--white); border:none; border-radius:4px; cursor:pointer; font-size:13px; font-family:'Noto Sans KR',sans-serif; }
.btn-primary:hover { background:var(--navy-dark); }
.btn-cancel { padding:10px 16px; border:1px solid var(--border); border-radius:4px; background:none; cursor:pointer; font-size:13px; color:var(--ink-mid); font-family:'Noto Sans KR',sans-serif; }
.error-msg { font-size:12px; color:var(--red); margin-bottom:8px; display:none; }

/* ─── 반응형 ─── */
@media (max-width:640px) {
  .wrap { padding:0 14px; }
  .topbar { padding:9px 16px; }
  .mag-header { padding:24px 16px 20px; }
  .editors-note { grid-template-columns:1fr; gap:8px 0; }
  .top5-item { grid-template-columns:38px 1fr auto; }
  .top5-num { font-size:26px; }
  .modal-inner { padding:18px 16px 26px; }
  .overlay-backdrop { padding:0; align-items:flex-end; }
  .overlay-modal { max-height:92vh; border-radius:12px 12px 0 0; }
  .site-footer { flex-direction:column; gap:4px; }
  .meta-bar { flex-direction:column; gap:4px; align-items:flex-start; padding:10px 16px; }
}
</style>
</head>
<body>

<!-- 상단 바 -->
<div class="topbar">
  <div class="topbar-live">
    <div class="live-dot"></div>
    <span>LIVE SIGNAL</span>
  </div>
  <div style="display:flex;gap:20px;align-items:center;">
    <span id="issue-label" style="font-size:10px;letter-spacing:2px;">ISSUE NO. —</span>
    <span class="admin-link" onclick="openAdminLogin()">관리자 ↗</span>
  </div>
</div>

<!-- 헤더 -->
<div class="mag-header">
  <div class="mag-logo">HR<span class="sig">시그널</span></div>
  <div class="mag-sub">KOREAN HR WEEKLY · EDITORIAL DIGEST</div>
</div>
<div class="header-rule"></div>

<!-- 날짜/이슈 바 -->
<div class="meta-bar">
  <span class="meta-date" id="mag-date">—</span>
  <div class="edition-selector" id="edition-selector" style="display:none;padding:0;border:none;background:transparent;"></div>
</div>

<!-- 본문 -->
<div class="wrap" style="padding-top:8px;">
  <div id="loading" class="loading">불러오는 중...</div>
  <div id="content" style="display:none"></div>
</div>

<footer class="site-footer">
  <span>© HR시그널 · 매일유업 피플팀</span>
  <span id="footer-date"></span>
</footer>

<!-- 기사 오버레이 -->
<div class="overlay-backdrop" id="overlay" onclick="handleBackdropClick(event)">
  <div class="overlay-modal">
    <div class="modal-inner" id="modal-inner"></div>
  </div>
</div>

<!-- 관리자 로그인 -->
<div class="admin-modal-backdrop" id="admin-modal">
  <div class="admin-modal">
    <h3>관리자 로그인</h3>
    <p>관리자 비밀번호를 입력하세요.</p>
    <div class="error-msg" id="login-error">비밀번호가 올바르지 않습니다.</div>
    <input type="password" id="admin-pw" placeholder="비밀번호" onkeydown="if(event.key==='Enter')tryLogin()">
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeAdminLogin()">취소</button>
      <button class="btn-primary" onclick="tryLogin()">로그인</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, onValue } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const firebaseConfig = {
  apiKey: "AIzaSyBIH03tDDCNSZHdq0_ru-4LnvaehECycSY",
  authDomain: "hrsignal.firebaseapp.com",
  databaseURL: "https://hrsignal-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "hrsignal",
  storageBucket: "hrsignal.firebasestorage.app",
  messagingSenderId: "978655131936",
  appId: "1:978655131936:web:74ed0e629baa74e8f93f45"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

onValue(ref(db, 'editions'), (snapshot) => {
  const data = snapshot.val();
  if (!data) { document.getElementById('loading').textContent = '등록된 기사가 없습니다.'; return; }
  const keys = Object.keys(data).sort().reverse();
  window._editionsData = data;
  window._editionKeys = keys;
  initPage(keys, data);
});
</script>

<script>
const ADMIN_PASSWORD = 'maeil2024';
let currentArticles = [];
let currentIndex = -1;

function initPage(keys, data) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('content').style.display = 'block';

  const sel = document.getElementById('edition-selector');
  if (keys.length > 1) {
    sel.style.display = 'flex';
    keys.forEach((k, i) => {
      const btn = document.createElement('button');
      btn.className = 'edition-btn' + (i === 0 ? ' active' : '');
      btn.textContent = data[k].title || k;
      btn.onclick = () => {
        document.querySelectorAll('.edition-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderEdition(data[k]);
        closeModal();
      };
      sel.appendChild(btn);
    });
  }
  renderEdition(data[keys[0]]);
}

function renderEdition(edition) {
  currentArticles = [];
  const num = (edition.title || '').replace(/[^0-9]/g, '');
  document.getElementById('issue-label').textContent = num ? `ISSUE NO. ${num.padStart(3,'0')}` : 'HR시그널';
  document.getElementById('mag-date').textContent = edition.date || '';
  document.getElementById('footer-date').textContent = edition.date || '';

  let html = '';

  if (edition.intro) {
    html += `<div class="editors-note">
      <div class="note-label">EDITOR'S<br>NOTE</div>
      <div class="note-body">${edition.intro}<div class="note-sig">— 편집자 K.</div></div>
    </div>`;
  }

  if (edition.top5 && edition.top5.length) {
    html += `<div class="sec-header">
      <div class="sec-header-left">
        <span class="sec-symbol">§ 00</span>
        <span class="sec-title">이번 주 Top 5</span>
      </div>
      <span class="sec-count">${edition.top5.length.toString().padStart(2,'0')} 건</span>
    </div>
    <div class="sec-desc">인급량·정책 임팩트 기준 편집자 선정</div>
    <ul class="top5-list">`;
    edition.top5.forEach((item, i) => {
      const idx = currentArticles.length;
      currentArticles.push({ ...item, _section: '이번 주 Top 5' });
      const badge = item.badge;
      html += `<li class="top5-item" onclick="openModal(${idx})" id="art-${idx}">
        <span class="top5-num">${String(i+1).padStart(2,'0')}</span>
        <div>
          <div class="top5-cat-row">
            <span class="top5-cat">${item.category||''}</span>
            ${item.date?`<span class="top5-dot"></span><span class="top5-date-sm">${item.date}</span>`:''}
          </div>
          <div class="top5-headline">${item.title}</div>
        </div>
        ${badge?`<span class="badge badge-${badge.type||'hot'}">${badge.label||''}</span>`:''}
      </li>`;
    });
    html += `</ul>`;
  }

  if (edition.editors_pick) {
    const ep = edition.editors_pick;
    const idx = currentArticles.length;
    currentArticles.push({ ...ep, _section: "Editor's Pick" });
    html += `<div class="pick-block" onclick="openModal(${idx})">
      <div class="pick-label">★ EDITOR'S PICK</div>
      <div class="pick-title">${ep.title}</div>
      ${ep.summary?`<div class="pick-desc">${ep.summary}</div>`:''}
    </div>`;
  }

  (edition.sections||[]).forEach((sec, si) => {
    if (!sec.articles || !sec.articles.length) return;
    html += `<div class="sec-header" style="margin-top:8px;">
      <div class="sec-header-left">
        <span class="sec-symbol">§ ${String(si+1).padStart(2,'0')}</span>
        <span class="sec-title">${sec.title}</span>
      </div>
      <span class="sec-count">${sec.articles.length.toString().padStart(2,'0')} 건</span>
    </div>
    <div class="sec-desc"></div>
    <ul class="news-list">`;
    sec.articles.forEach(item => {
      const idx = currentArticles.length;
      currentArticles.push({ ...item, _section: sec.title });
      const tags = (item.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('');
      html += `<li class="news-item" onclick="openModal(${idx})" id="art-${idx}">
        <div class="news-body">
          ${tags?`<div class="news-tags">${tags}</div>`:''}
          <div class="news-headline">${item.title}</div>
          ${item.summary?`<div class="news-snippet">${item.summary}</div>`:''}
        </div>
        <div class="news-meta">${item.date||''}</div>
      </li>`;
    });
    html += `</ul>`;
  });

  document.getElementById('content').innerHTML = html;
}

function openModal(idx) {
  if (currentIndex === idx) { closeModal(); return; }
  currentIndex = idx;
  const item = currentArticles[idx];
  document.querySelectorAll('.top5-item,.news-item,.pick-block').forEach(el => el.classList.remove('active'));
  const el = document.getElementById(`art-${idx}`);
  if (el) el.classList.add('active');

  const points = (item.points||[]).map(p=>`<li>${p}</li>`).join('');
  document.getElementById('modal-inner').innerHTML = `
    <div class="modal-top">
      <div class="modal-tags">
        ${(item.tags && item.tags.length)
          ? item.tags.map(t=>`<span class="modal-tag modal-tag-sec">${t}</span>`).join('')
          : `<span class="modal-tag modal-tag-cat">${item.category||item._section||''}</span>
             ${item.category && item._section && item._section !== item.category?`<span class="modal-tag modal-tag-sec">${item._section}</span>`:''}`}
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-title">${item.title}</div>
    <div class="modal-sub">${item.sub||'이번 주 가장 많이 언급된 이슈 중 하나입니다.'}</div>
    <hr class="modal-divider">
    <div class="modal-meta">
      <span>카테고리: <strong>${item.category||item._section||'-'}</strong></span>
      <span>발표일: <strong>${item.date||'-'}</strong></span>
      <span>출처: <strong>${item.source||'-'}</strong></span>
    </div>
    ${item.summary?`<div class="modal-summary-label">SUMMARY</div><div class="modal-summary">${item.summary}</div>`:''}
    ${points?`<ul class="modal-points">${points}</ul>`:''}
    <div class="modal-source">
      <span></span>
      ${item.url?`<a class="modal-link" href="${item.url}" target="_blank">원문 보기 →</a>`:''}
    </div>
    <div class="modal-nav">
      <button class="modal-nav-btn" onclick="navModal(-1)" ${idx===0?'disabled':''}>← 이전 기사</button>
      <button class="modal-nav-btn" onclick="navModal(1)" ${idx===currentArticles.length-1?'disabled':''}>다음 기사 →</button>
    </div>`;

  document.getElementById('overlay').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('overlay').classList.remove('show');
  document.body.style.overflow = '';
  document.querySelectorAll('.top5-item,.news-item,.pick-block').forEach(el => el.classList.remove('active'));
  currentIndex = -1;
}

function handleBackdropClick(e) {
  if (e.target === document.getElementById('overlay')) closeModal();
}

function navModal(dir) {
  const next = currentIndex + dir;
  if (next >= 0 && next < currentArticles.length) openModal(next);
}

function openAdminLogin() {
  document.getElementById('admin-modal').classList.add('show');
  setTimeout(() => document.getElementById('admin-pw').focus(), 100);
}

function closeAdminLogin() {
  document.getElementById('admin-modal').classList.remove('show');
  document.getElementById('admin-pw').value = '';
  document.getElementById('login-error').style.display = 'none';
}

function tryLogin() {
  const pw = document.getElementById('admin-pw').value;
  if (pw === ADMIN_PASSWORD) {
    closeAdminLogin();
    window.location.href = 'admin.html';
  } else {
    document.getElementById('login-error').style.display = 'block';
    document.getElementById('admin-pw').value = '';
    document.getElementById('admin-pw').focus();
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeModal(); closeAdminLogin(); }
});
</script>
</body>
</html>
